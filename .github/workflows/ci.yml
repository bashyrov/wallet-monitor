name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest + import smoke
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # 3.12 is the highest GHA runner has pre-baked; 3.13 forced a long
          # download + build step on every run and sometimes timed out on
          # private runners. Prod still runs 3.13 (python:3.13-slim image).
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          SECRET_KEY: ci-secret-key-not-real
          ENCRYPTION_KEY: ci-encryption-key-not-real
          DATABASE_URL: sqlite:///:memory:
        run: |
          python -m pytest -q --tb=short
