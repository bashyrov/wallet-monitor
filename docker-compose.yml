# Shared env block — both `app` (uvicorn, HTTP/WS) and `fetcher`
# (data plane) use identical env. Top-level YAML anchor keeps it DRY.
#
# DATABASE_URL routes through pgbouncer (session pool). App/alembic can stay
# session-mode so SQLAlchemy's statement cache keeps working unchanged;
# pgbouncer limits the backend Postgres connection count under load.
x-app-env: &app-env
  DATABASE_URL: postgresql://wallet:${POSTGRES_PASSWORD:-changeme}@pgbouncer:5432/avalant
  # Auth session + hot lookups. Optional — if unset, code falls back to DB.
  REDIS_URL: redis://redis:6379/0
  # Explicit admin seed: only this username becomes admin on register. Leave
  # unset in dev to keep legacy "first user wins" behaviour.
  INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-}
  # Opt-in fetcher split (see docs/fetcher-split-rfc.md). Default unset =
  # legacy single-process path. Set to `multiprocess` on prod AFTER a canary
  # run with AVALANT_WORKER_EXCHANGES=binance confirms books.json stays
  # fresh. Then expand to the full exchange list.
  AVALANT_FETCHER_MODE: ${AVALANT_FETCHER_MODE:-}
  AVALANT_WORKER_EXCHANGES: ${AVALANT_WORKER_EXCHANGES:-}
  # M4: per-exchange funding-WS workers. Same list format as
  # AVALANT_WORKER_EXCHANGES but independent — you can run orderbook
  # workers without funding workers or vice versa.
  AVALANT_FUNDING_WORKER_EXCHANGES: ${AVALANT_FUNDING_WORKER_EXCHANGES:-}
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
  ACCESS_TOKEN_EXPIRE_DAYS: ${ACCESS_TOKEN_EXPIRE_DAYS:-30}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  # Arb cadence knobs — tune without rebuild via `docker compose restart`.
  # Tightened to live-mode values (0.6 s → 0.3 s) after the post-PR-#104
  # snapshot optimisation brought compute cycles down to ~300 ms; with the
  # 12-core upgrade there's headroom to push opp updates every 300 ms
  # without starving anything else.
  # Live cadence: compute 300 ms + broadcast 200 ms. 200 ms refresh tripped
  # Binance/Aster's REST rate limiter (premiumIndex 429s) because the faster
  # cache-check cycle led to more cache-stale→REST-fallback transitions.
  # 300 ms is the sweet spot — cycle fits comfortably, WS cache stays primary.
  AVALANT_REFRESH_INTERVAL: ${AVALANT_REFRESH_INTERVAL:-0.3}
  AVALANT_BROADCAST_INTERVAL: ${AVALANT_BROADCAST_INTERVAL:-0.2}
  AVALANT_ARB_CACHE_TTL: ${AVALANT_ARB_CACHE_TTL:-0.4}
  AVALANT_PREWARM_HOTLIST_S: ${AVALANT_PREWARM_HOTLIST_S:-2.0}
  AVALANT_PREWARM_DUMP_S: ${AVALANT_PREWARM_DUMP_S:-0.1}
  # "subprocess" spawns a dedicated arb-compute worker so it stops stealing
  # the fetcher's main-loop GIL. Default unset = legacy in-master compute.
  # Opt-in per-env, can be toggled off by unsetting and restarting fetcher.
  AVALANT_ARB_COMPUTE_MODE: ${AVALANT_ARB_COMPUTE_MODE:-}
  CMC_API_KEY: ${CMC_API_KEY:-}
  TG_BOT_TOKEN: ${TG_BOT_TOKEN:-}
  TG_BOT_USERNAME: ${TG_BOT_USERNAME:-avalant_bot}
  # Optional dedicated bot for login + admin alerts + expiry reminders.
  # Empty → both flows fall back to TG_BOT_TOKEN (single-bot deployment).
  TG_AUTH_BOT_TOKEN: ${TG_AUTH_BOT_TOKEN:-}
  TG_AUTH_BOT_USERNAME: ${TG_AUTH_BOT_USERNAME:-}
  PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://avalant.xyz}
  CRYPTOCLOUD_API_KEY: ${CRYPTOCLOUD_API_KEY:-}
  CRYPTOCLOUD_SHOP_ID: ${CRYPTOCLOUD_SHOP_ID:-}
  CRYPTOCLOUD_WEBHOOK_SECRET: ${CRYPTOCLOUD_WEBHOOK_SECRET:-}
  CRYPTOCLOUD_SUCCESS_URL: ${CRYPTOCLOUD_SUCCESS_URL:-https://avalant.xyz/checkout?status=success}
  CRYPTOCLOUD_FAIL_URL: ${CRYPTOCLOUD_FAIL_URL:-https://avalant.xyz/checkout?status=fail}
  # Google OAuth (Sign in with Google). Leave blank to disable the button;
  # /api/auth/google/status returns enabled=false and the UI hides the button.
  GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
  GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
  GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
  # SMTP mailer (used for email-confirm codes on sensitive ops for Google-only users)
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM: ${SMTP_FROM:-Avalant <no-reply@avalant.xyz>}
  SMTP_TLS: ${SMTP_TLS:-1}
  AVALANT_COOKIE_SECURE: ${AVALANT_COOKIE_SECURE:-1}
  AVALANT_AUTH_DEV_EXPOSE_TOKEN: ${AVALANT_AUTH_DEV_EXPOSE_TOKEN:-}
  AVALANT_ALLOW_FIRST_USER_ADMIN: ${AVALANT_ALLOW_FIRST_USER_ADMIN:-}
  AVALANT_LOG_FORMAT: ${AVALANT_LOG_FORMAT:-text}
  # Trade-engine cutover: when AVALANT_INTERNAL_SECRET is set AND a
  # venue is listed in GO_TRADE_VENUES, the Python web role dispatches
  # /trade/open + /trade/close into the Go fetcher's /internal/trade/*
  # endpoints. Fall-through to local Python adapter on any failure.
  AVALANT_INTERNAL_SECRET: ${AVALANT_INTERNAL_SECRET:-}
  AVALANT_TRADE_PROXY_URL: ${AVALANT_TRADE_PROXY_URL:-http://go-fetcher:8090}
  GO_TRADE_VENUES: ${GO_TRADE_VENUES:-}
  ANKR_KEY: ${ANKR_KEY:-}
  TRON_KEY: ${TRON_KEY:-}
  TRON_RPC: ${TRON_RPC:-}
  SOLANA_RPC: ${SOLANA_RPC:-}
  ETHEREUM_RPC: ${ETHEREUM_RPC:-}
  BSC_RPC: ${BSC_RPC:-}
  POLYGON_RPC: ${POLYGON_RPC:-}
  ARBITRUM_RPC: ${ARBITRUM_RPC:-}
  OPTIMISM_RPC: ${OPTIMISM_RPC:-}
  BASE_RPC: ${BASE_RPC:-}
  AVALANCHE_RPC: ${AVALANCHE_RPC:-}
  ZKSYNC_RPC: ${ZKSYNC_RPC:-}
  LINEA_RPC: ${LINEA_RPC:-}
  SCROLL_RPC: ${SCROLL_RPC:-}
  MANTLE_RPC: ${MANTLE_RPC:-}
  BLAST_RPC: ${BLAST_RPC:-}

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: avalant
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet -d avalant"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Connection pool for Postgres. Session mode keeps SQLAlchemy's statement
  # cache + migrations working without code changes. MAX_CLIENT_CONN=500 lets
  # us accept ~500 concurrent HTTP/WS users while DEFAULT_POOL_SIZE caps real
  # backend connections — Postgres default is 100, we're consuming 20 tops.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: wallet
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      DB_NAME: avalant
      POOL_MODE: session
      MAX_CLIENT_CONN: 500
      # Session-mode pins one Postgres connection per SQLAlchemy session for
      # its whole lifetime. fetcher + web both open many short-lived sessions
      # across background loops (prewarm hot-list, alerts, plan expiry, admin
      # settings reads). 20 was exhausting under normal load and produced
      # bursts of "OperationalError: server closed the connection unexpectedly"
      # as clients timed out after 120s waiting for a backend. 60 gives ~3×
      # headroom without pressuring Postgres's default max_connections=100.
      DEFAULT_POOL_SIZE: 60
      RESERVE_POOL_SIZE: 20
      # Fail-fast: if a client can't acquire a backend within 10s, drop it
      # immediately so the app can retry, instead of queueing for 2 minutes.
      QUERY_WAIT_TIMEOUT: 10
      AUTH_TYPE: scram-sha-256
      LISTEN_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # In-memory cache — used for /auth/me session validation so hot paths don't
  # round-trip to Postgres on every authenticated request. Code falls back to
  # DB if Redis is unreachable (see backend/services/auth_cache.py).
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru", "--appendonly", "no", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    # Port not exposed directly — nginx proxies to it
    expose:
      - "8000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
      AVALANT_ROLE: web
      AVALANT_LOG_DIR: /var/log/avalant
      # The primary instance owns the alembic upgrade — app2 skips it
      # so two replicas don't race the alembic_version row.
      AVALANT_RUN_MIGRATIONS: "true"
    # Shared cache — fetcher writes, web reads (funding.json,
    # arbitrage.json, books.json, funding_ws.json, pending_subs.json).
    # Frontend bind-mount: host edits to ./frontend land in the container
    # the moment they're saved (FastAPI's StaticFiles re-reads on every
    # request), so a copy/edit/git-pull of HTML/JS/CSS lights up without
    # a container restart. Cache-Control max-age=60 on JS/CSS means old
    # browser caches refresh within a minute — for a hard cut-over flip
    # full-site maintenance, deploy, flip back.
    volumes:
      - avalant_cache:/tmp/avalant_cache
      - avalant_logs:/var/log/avalant
      - ./frontend:/app/frontend:ro

  # Second uvicorn replica behind nginx round-robin so a rolling deploy
  # never drops traffic. Identical to `app` except it doesn't run
  # migrations — only one instance does that.
  app2:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    environment:
      <<: *app-env
      AVALANT_ROLE: web
      AVALANT_LOG_DIR: /var/log/avalant
      AVALANT_RUN_MIGRATIONS: "false"
    volumes:
      - avalant_cache:/tmp/avalant_cache
      - avalant_logs:/var/log/avalant
      - ./frontend:/app/frontend:ro

  # Python fetcher — DECOMMISSIONED 2026-05-01 after Phase 7 cutover.
  # Kept as a comment for two months so we can `docker compose run
  # fetcher` for ad-hoc REST debugging if Go-fetcher hits a venue
  # quirk. Remove this whole block in 2026-07-01 cleanup.
  #
  # fetcher:
  #   build: .
  #   restart: unless-stopped
  #   depends_on:
  #     pgbouncer: { condition: service_healthy }
  #   command: ["python", "-m", "fetcher"]
  #   environment:
  #     <<: *app-env
  #     AVALANT_ROLE: fetcher
  #     AVALANT_LOG_DIR: /var/log/avalant
  #   volumes:
  #     - avalant_cache:/tmp/avalant_cache
  #     - avalant_logs:/var/log/avalant
  #     - ./frontend:/app/frontend:ro

  # Go fetcher — owns the entire hot path: orderbook WS (16+ venues),
  # funding WS (12 venues), futures + spot arb compute, file dump,
  # Redis writes. Python web roles read its output via the shared
  # /tmp/avalant_cache volume (same paths as the old Python fetcher
  # for backwards compatibility — Python's web.app.py is unchanged).
  go-fetcher:
    build:
      context: ./go-fetcher
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      # Shadow-mode default: write to a sibling cache dir so the
      # Python web/admin/trade roles continue reading Python's
      # books.json untouched. Override to /tmp/avalant_cache for
      # cutover.
      AVALANT_FETCHER_CACHE_DIR: ${GO_FETCHER_CACHE_DIR:-/tmp/avalant_cache_go}
      AVALANT_PREWARM_TOP_N: ${AVALANT_PREWARM_TOP_N:-20}
      # 250ms file-dump cadence (was 100ms). Web roles read books via
      # Redis (50ms throttle on writes), so the file path is fallback
      # only — its 100ms cadence was producing 22 MB/s of JSON
      # marshalling for paths the web rarely touches. 250ms keeps
      # cold-start freshness under quarter-second while cutting the
      # marshal-loop CPU by ~60%.
      AVALANT_FILE_DUMP_INTERVAL: ${AVALANT_FILE_DUMP_INTERVAL:-250ms}
      # Safety-net tick for /ws/book. Push-through (OnBookUpdate) handles
      # real-time updates; this tick covers pairs that didn't fire a Store
      # callback. 1s default — was 25ms, redundant on the hot path.
      AVALANT_BOOK_TICK_INTERVAL: ${AVALANT_BOOK_TICK_INTERVAL:-1s}
      # Book flushLoop interval — hard ceiling on client update frequency.
      # Default 50ms = 20/sec. Lower raises throughput; min clamp 10ms.
      # e.g. "33ms" → ~30/sec, "25ms" → 40/sec.
      AVALANT_BOOK_FLUSH_INTERVAL: ${AVALANT_BOOK_FLUSH_INTERVAL:-50ms}
      # Toggle for the Redis orderbook mirror (`ob:<ex>:<sym>` SETEX on
      # every cache update). Python REST callers fall through to the
      # file cache (orderbook_cache.py:900+), so this is safely
      # opt-out. Default true preserves current behaviour; flip to
      # false to save ~2-3 cores on go-fetcher.
      AVALANT_REDIS_BOOK_WRITE: ${AVALANT_REDIS_BOOK_WRITE:-true}
      # Override LOG_LEVEL specifically for go-fetcher: WARN silences the
      # per-frame "subscribe frame sent" / "recv frame" diagnostics that
      # added measurable CPU + log I/O on prod (~10% of one core).
      LOG_LEVEL: ${GO_FETCHER_LOG_LEVEL:-WARN}
      # WS broadcaster — when set, the Go fetcher binds an HTTP listener
      # on this port and serves /api/screener/ws/long-short (+ /ws/arb
      # legacy alias). nginx upstreams those paths to go-fetcher:8090.
      # Empty = disabled (Python keeps owning the channel).
      AVALANT_WS_BROADCAST_PORT: "8090"
      # Same secret Python signs JWTs with — first-frame {"auth":"<JWT>"}
      # is validated here so authed users get a uid attached. Required:
      # without it the broadcaster runs anon-only.
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      # Shared-secret header /internal/trade/* checks. Empty value
      # disables the trade endpoints entirely (returns 403 to every
      # request). Same value lives on app + app2 via x-app-env.
      AVALANT_INTERNAL_SECRET: ${AVALANT_INTERNAL_SECRET:-}
      # Phase 2 BBO channel flags — each switches the WS channel for that
      # venue to the fastest top-of-book stream. Set =1 in .env to enable.
      # Default empty = off (keeps existing depth channel).
      BINANCE_USE_BBO: ${BINANCE_USE_BBO:-}
      GATE_USE_BBO: ${GATE_USE_BBO:-}
      ASTER_USE_BBO: ${ASTER_USE_BBO:-}
      HL_USE_BBO: ${HL_USE_BBO:-}
      BINGX_USE_BBO: ${BINGX_USE_BBO:-}
      HTX_USE_BBO: ${HTX_USE_BBO:-}
      PARADEX_USE_BBO: ${PARADEX_USE_BBO:-}
    volumes:
      - avalant_cache:/tmp/avalant_cache         # mounted RW so we can
                                                  # bootstrap top-N from
                                                  # Python's funding.json
      - avalant_cache_go:/tmp/avalant_cache_go   # shadow scratch
      - avalant_logs:/var/log/avalant

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app
      - app2

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renew twice a day (certbot skips if not due yet)
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"

volumes:
  postgres_data:
  certbot_certs:
  certbot_www:
  avalant_cache:
  avalant_cache_go:
  avalant_logs:
