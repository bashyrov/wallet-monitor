# Shared env block — both `app` (uvicorn, HTTP/WS) and `fetcher`
# (data plane) use identical env. Top-level YAML anchor keeps it DRY.
#
# DATABASE_URL routes through pgbouncer (session pool). App/alembic can stay
# session-mode so SQLAlchemy's statement cache keeps working unchanged;
# pgbouncer limits the backend Postgres connection count under load.
x-app-env: &app-env
  DATABASE_URL: postgresql://wallet:${POSTGRES_PASSWORD:-changeme}@pgbouncer:5432/avalant
  # Auth session + hot lookups. Optional — if unset, code falls back to DB.
  REDIS_URL: redis://redis:6379/0
  # Explicit admin seed: only this username becomes admin on register. Leave
  # unset in dev to keep legacy "first user wins" behaviour.
  INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-}
  # Opt-in fetcher split (see docs/fetcher-split-rfc.md). Default unset =
  # legacy single-process path. Set to `multiprocess` on prod AFTER a canary
  # run with AVALANT_WORKER_EXCHANGES=binance confirms books.json stays
  # fresh. Then expand to the full exchange list.
  AVALANT_FETCHER_MODE: ${AVALANT_FETCHER_MODE:-}
  AVALANT_WORKER_EXCHANGES: ${AVALANT_WORKER_EXCHANGES:-}
  # M4: per-exchange funding-WS workers. Same list format as
  # AVALANT_WORKER_EXCHANGES but independent — you can run orderbook
  # workers without funding workers or vice versa.
  AVALANT_FUNDING_WORKER_EXCHANGES: ${AVALANT_FUNDING_WORKER_EXCHANGES:-}
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
  ACCESS_TOKEN_EXPIRE_DAYS: ${ACCESS_TOKEN_EXPIRE_DAYS:-30}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  # Arb cadence knobs — tune without rebuild via `docker compose restart`.
  # Tightened to live-mode values (0.6 s → 0.3 s) after the post-PR-#104
  # snapshot optimisation brought compute cycles down to ~300 ms; with the
  # 12-core upgrade there's headroom to push opp updates every 300 ms
  # without starving anything else.
  # Live cadence: compute 300 ms + broadcast 200 ms. 200 ms refresh tripped
  # Binance/Aster's REST rate limiter (premiumIndex 429s) because the faster
  # cache-check cycle led to more cache-stale→REST-fallback transitions.
  # 300 ms is the sweet spot — cycle fits comfortably, WS cache stays primary.
  AVALANT_REFRESH_INTERVAL: ${AVALANT_REFRESH_INTERVAL:-0.3}
  AVALANT_BROADCAST_INTERVAL: ${AVALANT_BROADCAST_INTERVAL:-0.2}
  AVALANT_ARB_CACHE_TTL: ${AVALANT_ARB_CACHE_TTL:-0.4}
  AVALANT_PREWARM_HOTLIST_S: ${AVALANT_PREWARM_HOTLIST_S:-2.0}
  AVALANT_PREWARM_DUMP_S: ${AVALANT_PREWARM_DUMP_S:-0.1}
  # "subprocess" spawns a dedicated arb-compute worker so it stops stealing
  # the fetcher's main-loop GIL. Default unset = legacy in-master compute.
  # Opt-in per-env, can be toggled off by unsetting and restarting fetcher.
  AVALANT_ARB_COMPUTE_MODE: ${AVALANT_ARB_COMPUTE_MODE:-}
  CMC_API_KEY: ${CMC_API_KEY:-}
  TG_BOT_TOKEN: ${TG_BOT_TOKEN:-}
  TG_BOT_USERNAME: ${TG_BOT_USERNAME:-avalant_bot}
  ANKR_KEY: ${ANKR_KEY:-}
  TRON_KEY: ${TRON_KEY:-}
  TRON_RPC: ${TRON_RPC:-}
  SOLANA_RPC: ${SOLANA_RPC:-}
  ETHEREUM_RPC: ${ETHEREUM_RPC:-}
  BSC_RPC: ${BSC_RPC:-}
  POLYGON_RPC: ${POLYGON_RPC:-}
  ARBITRUM_RPC: ${ARBITRUM_RPC:-}
  OPTIMISM_RPC: ${OPTIMISM_RPC:-}
  BASE_RPC: ${BASE_RPC:-}
  AVALANCHE_RPC: ${AVALANCHE_RPC:-}
  ZKSYNC_RPC: ${ZKSYNC_RPC:-}
  LINEA_RPC: ${LINEA_RPC:-}
  SCROLL_RPC: ${SCROLL_RPC:-}
  MANTLE_RPC: ${MANTLE_RPC:-}
  BLAST_RPC: ${BLAST_RPC:-}

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: avalant
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallet -d avalant"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Connection pool for Postgres. Session mode keeps SQLAlchemy's statement
  # cache + migrations working without code changes. MAX_CLIENT_CONN=500 lets
  # us accept ~500 concurrent HTTP/WS users while DEFAULT_POOL_SIZE caps real
  # backend connections — Postgres default is 100, we're consuming 20 tops.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: wallet
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      DB_NAME: avalant
      POOL_MODE: session
      MAX_CLIENT_CONN: 500
      # Session-mode pins one Postgres connection per SQLAlchemy session for
      # its whole lifetime. fetcher + web both open many short-lived sessions
      # across background loops (prewarm hot-list, alerts, plan expiry, admin
      # settings reads). 20 was exhausting under normal load and produced
      # bursts of "OperationalError: server closed the connection unexpectedly"
      # as clients timed out after 120s waiting for a backend. 60 gives ~3×
      # headroom without pressuring Postgres's default max_connections=100.
      DEFAULT_POOL_SIZE: 60
      RESERVE_POOL_SIZE: 20
      # Fail-fast: if a client can't acquire a backend within 10s, drop it
      # immediately so the app can retry, instead of queueing for 2 minutes.
      QUERY_WAIT_TIMEOUT: 10
      AUTH_TYPE: scram-sha-256
      LISTEN_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # In-memory cache — used for /auth/me session validation so hot paths don't
  # round-trip to Postgres on every authenticated request. Code falls back to
  # DB if Redis is unreachable (see backend/services/auth_cache.py).
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru", "--appendonly", "no", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    # Port not exposed directly — nginx proxies to it
    expose:
      - "8000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *app-env
      AVALANT_ROLE: web
      AVALANT_LOG_DIR: /var/log/avalant
    # Shared cache — fetcher writes, web reads (funding.json,
    # arbitrage.json, books.json, funding_ws.json, pending_subs.json)
    volumes:
      - avalant_cache:/tmp/avalant_cache
      - avalant_logs:/var/log/avalant

  fetcher:
    build: .
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
    command: ["python", "-m", "fetcher"]
    environment:
      <<: *app-env
      AVALANT_ROLE: fetcher
      AVALANT_LOG_DIR: /var/log/avalant
    volumes:
      - avalant_cache:/tmp/avalant_cache
      - avalant_logs:/var/log/avalant

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/nginx/certs:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renew twice a day (certbot skips if not due yet)
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"

volumes:
  postgres_data:
  certbot_certs:
  certbot_www:
  avalant_cache:
  avalant_logs:
