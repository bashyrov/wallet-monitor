worker_processes auto;
events { worker_connections 1024; }
http {
    # Docker DNS — re-resolve app container on each request so nginx
    # picks up the new IP when app redeploys (was causing 502s).
    resolver 127.0.0.11 valid=5s ipv6=off;

    # Per-IP rate limit zones. burst= absorbs short spikes; delay=nodelay
    # means the first burst is served fast, over-the-burst rejected 429.
    # auth:   bot protection on /api/auth/*
    # hot:    /api/portfolio/balance (expensive provider fetches)
    # api:    generic fallback on everything under /api/
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=hot:10m  rate=20r/m;
    limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/s;
    limit_req_status 429;

    # Concurrent-connection cap per IP. Without this an attacker can open
    # thousands of WebSocket connections from one IP and exhaust the
    # upstream worker pool. Legitimate users open 1-2 tabs (each tab can
    # multiplex /ws/funding + /ws/long-short + /ws/book = up to 3 sockets),
    # so 10 is generous. ws zone covers /api/screener/ws/* only — REST
    # connections go through limit_req which already throttles them.
    limit_conn_zone $binary_remote_addr zone=ws:10m;
    limit_conn_status 429;

    # Round-robin between app + app2 so a rolling deploy never drops
    # traffic. fail_timeout=10s lets nginx route around a restarting
    # instance within 10 seconds. proxy_next_upstream below retries on
    # 5xx / connect errors so the user never sees the failover.
    upstream avalant_app {
        # max_fails=1 + a 2s connect timeout below = a single dead
        # request is enough to ban an instance from the pool for the
        # next 10 s. Combined with proxy_next_upstream, the user never
        # sees the 502.
        # No `keepalive`: a stale keepalive connection to a restarting
        # backend is the #1 cause of "502 in <30 ms" we saw during
        # rolling-deploy probes — nginx won't retry POSTs once the
        # request body is on the wire, so we'd rather pay the connect
        # overhead and keep failover honest.
        server app:8000  max_fails=1 fail_timeout=10s;
        server app2:8000 max_fails=1 fail_timeout=10s;
    }

    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 2m;
    server_tokens off;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
    gzip_min_length 512;

    server {
        listen 80;
        server_name _;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location ~ ^/api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://avalant_app;
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
            proxy_connect_timeout 2s;
            proxy_next_upstream_timeout 5s;
            proxy_next_upstream_tries 2;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/portfolio/balance {
            limit_req zone=hot burst=5 nodelay;
            proxy_pass http://avalant_app;
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
            proxy_connect_timeout 2s;
            proxy_next_upstream_timeout 5s;
            proxy_next_upstream_tries 2;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=api burst=40 nodelay;
 return 301 https://$host$request_uri; }
    }

    server {
        listen 443 ssl;
        server_name avalant.xyz www.avalant.xyz;
        ssl_certificate     /etc/nginx/certs/live/avalant.xyz/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/live/avalant.xyz/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location /api/screener/ws/ {
            limit_conn ws 10;
            proxy_pass http://avalant_app;
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
            proxy_connect_timeout 2s;
            proxy_next_upstream_timeout 5s;
            proxy_next_upstream_tries 2;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }

        location / {
            proxy_pass http://avalant_app;
            proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
            proxy_connect_timeout 2s;
            proxy_next_upstream_timeout 5s;
            proxy_next_upstream_tries 2;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
