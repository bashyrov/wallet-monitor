<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="icon" type="image/png" sizes="48x48" href="/avalant_favicon-48.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/avalant_favicon-96.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/avalant_favicon-192.png">
  <link rel="icon" type="image/svg+xml" href="/avalant_favicon.svg">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="192x192" href="/avalant_favicon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile — Avalant</title>
  <link rel="stylesheet" href="/design.css">
  <link rel="stylesheet" href="/navbar.css?v=20260628b">
  <link rel="stylesheet" href="/fonts/fonts.css">
  <style>
    /* :root tokens come from /design.css */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { overflow-x: hidden; max-width: 100%; }

    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font); font-size: 14px;
      line-height: 1.5; min-height: 100vh;
      padding-bottom: 80px;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }
    body::before {
      content:''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse 70% 30% at 50% 0%, rgba(26,255,171,0.04), transparent 70%);
    }
    .topbar, .page, main { position: relative; z-index: 1; }

    /* ── TOPBAR ── */
    .topbar {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; padding: 0 24px; height: 52px;
      background: rgba(14,14,17,0.88);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 11px; border-radius: 8px;
      font-size: 13px; font-weight: 500; color: var(--text3);
      text-decoration: none; border: 1px solid transparent;
      transition: color 0.15s, background 0.15s;
    }
    .back-btn:hover { color: var(--text); background: var(--surface3); }
    .brand {
      font-size: 18px; font-weight: 800; letter-spacing: -0.7px;
      color: var(--text); text-decoration: none; user-select: none;
    }
    .brand span { color: var(--green); animation: blink 1.1s step-start infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .topbar-right { display: flex; justify-content: flex-end; }

    /* ── PAGE ── */
    .page { max-width: 720px; margin: 0 auto; padding: 40px 24px 80px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── USER HERO ── */
    .user-hero {
      display: flex; align-items: center; gap: 20px;
      padding: 28px 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 20px;
      position: relative; overflow: hidden;
      animation: fadeUp 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }
    .user-hero::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(26,255,171,0.15), transparent);
    }
    .user-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, var(--surface3) 0%, var(--surface4) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700; color: var(--text2);
      flex-shrink: 0;
    }
    .user-avatar.blocked { opacity: 0.5; }
    .user-info { flex: 1; min-width: 0; }
    .user-name {
      font-size: 20px; font-weight: 700; letter-spacing: -0.4px;
      margin-bottom: 3px; display: flex; align-items: center; gap: 8px;
    }
    .user-email { font-size: 13px; color: var(--text3); margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-joined { font-size: 11px; color: var(--text4); }
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 99px;
      font-size: 10px; font-weight: 600; letter-spacing: .3px; text-transform: uppercase;
    }
    .badge.admin  { background: var(--green-dim); color: var(--green); border: 1px solid rgba(26,255,171,0.15); }
    .badge.blocked { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
    .user-actions { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; flex-shrink: 0; }

    .btn-block {
      padding: 6px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 500; font-family: var(--font);
      cursor: pointer; border: 1px solid; transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-block.do-block { background: transparent; border-color: rgba(248,113,113,0.3); color: var(--red); }
    .btn-block.do-block:hover { background: var(--red-dim); border-color: rgba(248,113,113,0.5); }
    .btn-block.do-unblock { background: transparent; border-color: rgba(26,255,171,0.25); color: var(--green); }
    .btn-block.do-unblock:hover { background: var(--green-dim); border-color: rgba(26,255,171,0.4); }


    /* ── STATS ── */
    .stats-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-bottom: 20px;
      animation: fadeUp 0.35s cubic-bezier(0.16,1,0.3,1) 0.05s both;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px;
    }
    .stat-num {
      font-family: var(--mono); font-size: 28px; font-weight: 600;
      letter-spacing: -1px; margin-bottom: 2px;
    }
    .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.8px; }

    /* ── WALLETS ── */
    .section-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      animation: fadeUp 0.35s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
    }
    .section-title { font-size: 13px; font-weight: 600; }
    .wallet-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 20px; border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .wallet-item:last-child { border-bottom: none; }
    .type-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .wallet-name { font-weight: 500; flex: 1; }
    .wallet-type-label { font-size: 11px; color: var(--text3); }
    .empty-state { padding: 24px; text-align: center; color: var(--text4); font-size: 13px; }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .topbar { grid-template-columns: auto 1fr; padding: 0 14px; }
      .page { padding: 20px 14px 60px; }
      .user-hero { flex-direction: column; align-items: flex-start; gap: 14px; padding: 20px 16px; }
      .user-actions { flex-direction: row; align-items: center; width: 100%; }
      .user-name { font-size: 17px; }
      .stats-row { grid-template-columns: 1fr 1fr; }
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 18px;
      font-size: 13px; color: var(--text2);
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
      z-index: 999; white-space: nowrap;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <a href="/admin" class="back-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M7.5 2L3.5 6l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Admin
    </a>
  </div>
  <a href="/" class="brand">avalant<span>_</span></a>
  <div class="topbar-right"></div>
</header>

<div class="page" id="page" style="display:none">

  <!-- User hero -->
  <div class="user-hero" id="user-hero">
    <div class="user-avatar" id="user-avatar">?</div>
    <div class="user-info">
      <div class="user-name" id="user-name">—</div>
      <div class="user-email" id="user-email">—</div>
      <div class="user-joined" id="user-joined">—</div>
    </div>
    <div class="user-actions" id="user-actions"></div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="stat-wallets">—</div>
      <div class="stat-label">Wallets</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-requests">—</div>
      <div class="stat-label">Requests</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-last-active" style="font-size:13px;font-family:var(--mono)">—</div>
      <div class="stat-label">Last active</div>
    </div>
  </div>

  <!-- Wallets list -->
  <div class="section-card">
    <div class="section-head">
      <span class="section-title">Wallets</span>
    </div>
    <div id="wallets-list"></div>
  </div>

</div>

<div id="toast"></div>

<!-- Shared modules bundled — see frontend/build.mjs. -->
<script src="/dist/core.min.js?v=20260628b"></script>
<script>
Auth.requireAdmin('/portfolio');

const params = new URLSearchParams(location.search);
const userId = parseInt(params.get('id'));
if (!userId) location.href = '/admin';

let userData = null;

const TYPE_COLOR = { exchange: '#E5C07B', chain: '#06B6D4', perpdex: '#925BD6' };

async function load() {
  try {
    const resp = await Auth.apiFetch(`/admin/users/${userId}`);
    if (!resp.ok) throw new Error(resp.status);
    userData = await resp.json();
  } catch(e) {
    toast('Failed to load user'); return;
  }

  const u = userData;
  document.title = `${u.username} — Avalant`;

  // Avatar
  const av = document.getElementById('user-avatar');
  av.textContent = u.username[0].toUpperCase();
  if (u.is_blocked) av.classList.add('blocked');

  // Name + badges
  const nameBadges = [u.username];
  let badgesHtml = '';
  if (u.is_admin)   badgesHtml += '<span class="badge admin">admin</span>';
  if (u.is_blocked) badgesHtml += '<span class="badge blocked">blocked</span>';
  document.getElementById('user-name').innerHTML = `<span>${u.username}</span>${badgesHtml}`;
  document.getElementById('user-email').textContent = u.email;
  document.getElementById('user-joined').textContent = 'Member since ' + u.created_at;

  // Stats
  document.getElementById('stat-wallets').textContent = u.wallets.length;
  document.getElementById('stat-requests').textContent = (u.request_count || 0).toLocaleString('en-US');
  document.getElementById('stat-last-active').textContent = u.last_active_at || 'Never';

  // Actions
  renderActions(u);

  // Wallets list
  const wl = document.getElementById('wallets-list');
  if (!u.wallets.length) {
    wl.innerHTML = '<div class="empty-state">No wallets</div>';
  } else {
    wl.innerHTML = u.wallets.map(w => {
      const color = TYPE_COLOR[w.wallet_type] || '#9B9FAB';
      return `<div class="wallet-item">
        <span class="type-dot" style="background:${color}"></span>
        <span class="wallet-name">${esc(w.name)}</span>
        <span class="wallet-type-label">${w.type_value}</span>
      </div>`;
    }).join('');
  }

  document.getElementById('page').style.display = '';
}

function renderActions(u) {
  const me = Auth.getUser();
  if (me && me.id === u.id) {
    document.getElementById('user-actions').innerHTML = '';
    return;
  }
  const blockLabel = u.is_blocked ? 'Unblock' : 'Block';
  const blockClass = u.is_blocked ? 'do-unblock' : 'do-block';
  document.getElementById('user-actions').innerHTML = `
    <button class="btn-block ${blockClass}" onclick="toggleBlock()">${blockLabel}</button>
  `;
}

async function toggleBlock() {
  try {
    const resp = await Auth.apiFetch(`/admin/users/${userId}/block`, { method: 'PATCH' });
    const res = await resp.json();
    userData.is_blocked = res.is_blocked;
    const av = document.getElementById('user-avatar');
    av.classList.toggle('blocked', res.is_blocked);
    // Re-render name badges and actions
    let badgesHtml = '';
    if (userData.is_admin)   badgesHtml += '<span class="badge admin">admin</span>';
    if (userData.is_blocked) badgesHtml += '<span class="badge blocked">blocked</span>';
    document.getElementById('user-name').innerHTML = `<span>${userData.username}</span>${badgesHtml}`;
    renderActions(userData);
    toast(res.is_blocked ? 'User blocked' : 'User unblocked');
  } catch(e) { toast('Error'); }
}


function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

load();
</script>
