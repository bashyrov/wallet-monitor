<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/avalant_favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Avalant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0E0E11;
      --surface:   #131217;
      --surface2:  #17171C;
      --surface3:  #202028;
      --border:    #22222A;
      --text:      #E6E8E3;
      --text2:     #9B9FAB;
      --text3:     #676B7E;
      --text4:     #393B47;
      --green:     #1AFFAB;
      --green-dim: rgba(26,255,171,0.08);
      --green-glow:rgba(26,255,171,0.2);
      --teal:      #06B6D4;
      --font: 'Inter', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: var(--green-dim); color: var(--green); }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .page-center {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 40%, black 30%, transparent 100%);
    }
    body::after {
      content: '';
      position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
      width: 700px; height: 400px; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse, rgba(26,255,171,0.06) 0%, transparent 70%);
    }

    /* ── TOPBAR ── */
    .topbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 24px; height: 52px;
      background: rgba(14,14,17,0.88);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .topbar::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(26,255,171,0.15), transparent);
      pointer-events: none;
    }
    .brand {
      display: flex; align-items: center;
      font-size: 18px; font-weight: 800; letter-spacing: -0.7px; line-height: 1;
      color: var(--text); text-decoration: none; user-select: none; flex-shrink: 0;
      font-family: var(--font);
    }
    .brand:hover { opacity: 0.85; }
    .brand-cursor {
      color: var(--green);
      animation: blink 1.1s step-start infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .topbar-nav {
      display: flex; align-items: center; gap: 2px;
      justify-content: center;
    }
    .topbar-right {
      display: flex; align-items: center; gap: 8px;
      justify-content: flex-end;
    }
    .nav-lnk {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 11px; border-radius: 8px;
      font-size: 13px; font-weight: 500; color: var(--text3);
      text-decoration: none; white-space: nowrap;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
      border: 1px solid transparent;
    }
    .nav-lnk svg { opacity: 0.6; transition: opacity 0.15s; flex-shrink: 0; }
    .nav-lnk:hover {
      color: var(--green);
      background: rgba(26,255,171,0.08);
      border-color: rgba(26,255,171,0.12);
    }
    .nav-lnk:hover svg { opacity: 1; }
    .nav-lnk.active {
      color: var(--green);
      background: rgba(26,255,171,0.1);
      border-color: rgba(26,255,171,0.18);
    }
    .nav-lnk.active svg { opacity: 1; }
    .avatar-btn {
      width: 30px; height: 30px; border-radius: 50%;
      background: linear-gradient(135deg, var(--green), #06B6D4);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #09090B;
      text-decoration: none; cursor: pointer; flex-shrink: 0;
      transition: box-shadow 0.2s;
    }
    .avatar-btn:hover { box-shadow: 0 0 10px rgba(26,255,171,0.35); }
    .topbar-right .btn-primary {
      border-radius: 8px;
      height: 30px;
      padding: 0 12px;
      font-size: 13px;
      transition: box-shadow 0.2s, background 0.15s;
    }
    .topbar-right .btn-primary:hover {
      background: #00E89A;
      box-shadow: 0 0 14px rgba(26,255,171,0.35);
      transform: none;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0 14px; height: 34px; border-radius: 99px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text2); cursor: pointer;
      font-family: var(--font); font-size: 13px; font-weight: 500;
      transition: all 0.15s ease; white-space: nowrap; user-select: none;
      text-decoration: none;
    }
    .btn-primary {
      background: var(--green); border-color: var(--green); color: #09090B; font-weight: 500;
    }
    .btn-primary:hover {
      background: #00E89A; border-color: #00E89A;
      box-shadow: 0 0 20px rgba(26,255,171,0.25); transform: translateY(-1px);
    }
    .btn-sm { padding: 0 10px; height: 28px; font-size: 12px; }

    .card {
      position: relative; z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 40px;
      width: 100%; max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: cardIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(26,255,171,0.15), transparent);
      border-radius: 16px 16px 0 0;
    }

    .card-logo {
      display: flex; justify-content: center; margin-bottom: 28px;
    }
    .logo-mark {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg, var(--green) 0%, var(--teal) 100%);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 32px rgba(26,255,171,0.25);
    }
    .logo-mark svg { width: 24px; height: 24px; }

    .card-title { text-align: center; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
    .card-sub { text-align: center; font-size: 13px; color: var(--text3); margin-bottom: 28px; }

    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--text3); margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 10px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text); font-family: var(--font); font-size: 14px;
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(26,255,171,0.1);
    }
    .form-input::placeholder { color: var(--text4); }

    /* plan picker */
    .plan-cards {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
      margin-bottom: 16px;
    }
    .plan-card {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      background: var(--surface2);
      text-align: center;
    }
    .plan-card:hover { border-color: #353545; }
    .plan-card.active { border-color: var(--green); background: var(--green-dim); }
    .plan-card-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
    .plan-card.active .plan-card-name { color: var(--green); }
    .plan-card-price { font-size: 11px; color: var(--text3); }

    .btn-submit {
      width: 100%; height: 44px;
      background: var(--green); color: #09090B;
      border: none; border-radius: 8px;
      font-family: var(--font); font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
      margin-top: 6px;
    }
    .btn-submit:hover {
      background: #00E89A;
      box-shadow: 0 0 28px var(--green-glow);
      transform: translateY(-1px);
    }
    .btn-submit:active { transform: translateY(0); box-shadow: none; }

    .demo-note {
      background: var(--green-dim);
      border: 1px solid rgba(26,255,171,0.15);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px; color: var(--text2);
      margin-top: 16px; text-align: center;
    }
    .demo-note strong { color: var(--green); }

    .login-row {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: var(--text3);
    }
    .login-row a { color: var(--green); text-decoration: none; font-weight: 500; }
    .login-row a:hover { text-decoration: underline; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      display: none;
      position: fixed; bottom: 12px; left: 12px; right: 12px; height: 64px;
      background: rgba(13,13,16,0.82);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.07); border-radius: 20px;
      z-index: 300; align-items: center; justify-content: space-around; padding: 0 4px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .bnav-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 8px 14px; border-radius: 12px; text-decoration: none; color: var(--text3);
      font-size: 10px; font-weight: 500; transition: color 0.15s; flex: 1; max-width: 80px;
    }
    .bnav-item svg { flex-shrink: 0; opacity: 0.45; transition: opacity 0.15s; }
    .bnav-item:hover { color: var(--text2); }
    .bnav-item:hover svg { opacity: 0.7; }
    .bnav-item.active { color: var(--green); }
    .bnav-item.active svg { opacity: 1; }

    @media (max-width: 768px) {
      .bottom-nav { display: flex; }
      body { padding-bottom: 88px; }
      .topbar { grid-template-columns: auto 1fr; padding: 0 16px; }
      .topbar-nav { display: none; }
      .topbar-right { display: none; }
      .page-center { padding: 24px 16px; }
    }
  
    /* ── Free Banner ── */
    .free-banner {
      position: fixed;
      top: 60px;
      left: 12px;
      right: 12px;
      z-index: 98;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 9px 20px;
      background: rgba(14,14,17,0.92);
      border: 1px solid rgba(26,255,171,0.18);
      border-radius: 12px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      font-size: 13px;
      color: var(--text2);
      letter-spacing: 0.01em;
      animation: bannerIn 0.45s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay: 0.7s;
      opacity: 0;
    }
    .free-banner-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 7px rgba(26,255,171,0.65);
      flex-shrink: 0;
    }
    .free-banner em { font-style: normal; color: var(--text); font-weight: 500; }
    .free-banner-close {
      position: absolute;
      right: 12px;
      background: none; border: none;
      color: var(--text3); font-size: 15px; line-height: 1;
      cursor: pointer; padding: 4px 5px; border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .free-banner-close:hover { color: var(--text); background: var(--surface3); }
    @keyframes bannerIn {
      from { transform: translateY(-14px); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }

    </style>
</head>
<body>

<header class="topbar">
  <a href="/" class="brand">
    avalant<span class="brand-cursor">_</span>
  </a>
  <nav class="topbar-nav"></nav>
  <div class="topbar-right">
    <a href="/login" class="nav-lnk"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2H10a1 1 0 011 1v6a1 1 0 01-1 1H8M5 9l3-3-3-3M1 6h7" stroke="currentColor" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"/></svg> Sign in</a>
    <a href="/app" class="btn btn-primary btn-sm">Open App</a>
  </div>
</header>

<!-- ── Free Banner ── -->
<div class="free-banner" id="free-banner">
  <span class="free-banner-dot"></span>
  Use all features for free — <em>no credit card required</em>
  <button class="free-banner-close" onclick="dismissFreeBanner()" aria-label="Dismiss">✕</button>
</div>
<script>
  (function(){
    if(localStorage.getItem('avalant-banner-dismissed')){
      var b=document.getElementById('free-banner');
      if(b) b.style.display='none';
    }
  })();
  function dismissFreeBanner(){
    var b=document.getElementById('free-banner');
    if(!b) return;
    b.style.transition='opacity 0.2s, transform 0.2s';
    b.style.opacity='0';
    b.style.transform='translateY(-14px)';
    setTimeout(function(){ b && b.remove(); }, 220);
    localStorage.setItem('avalant-banner-dismissed','1');
  }
</script>


<div class="page-center">
<div class="card">
  <div class="card-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="2" y="7" width="20" height="14" rx="2.5" stroke="#09090B" stroke-width="2"/>
        <path d="M7 7V5C7 3.9 7.9 3 9 3H15C16.1 3 17 3.9 17 5V7" stroke="#09090B" stroke-width="2"/>
        <circle cx="12" cy="14" r="2" fill="#09090B"/>
      </svg>
    </div>
  </div>

  <div class="card-title">Create account</div>
  <div class="card-sub">Start monitoring your crypto portfolio</div>

  <form id="reg-form" onsubmit="handleRegister(event)">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input id="f-username" class="form-input" type="text" placeholder="yourname" autocomplete="username" required minlength="3">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input id="f-email" class="form-input" type="email" placeholder="you@example.com" autocomplete="email" required>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input id="f-password" class="form-input" type="password" placeholder="Min 6 characters" autocomplete="new-password" required minlength="6">
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input id="f-password2" class="form-input" type="password" placeholder="Repeat password" autocomplete="new-password" required>
    </div>

    <div id="reg-error" style="display:none;color:var(--red);font-size:12px;margin-bottom:10px;padding:8px 10px;background:var(--red-dim);border-radius:7px;"></div>

    <button type="submit" class="btn-submit" id="btn-submit">Create Account</button>
  </form>

  <div class="login-row">
    Already have an account? <a href="/login">Sign in</a>
  </div>
</div>
</div>

<script src="/auth.js"></script>
<script>
Auth.redirectIfAuthed('/app');

async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-submit');
  const errEl = document.getElementById('reg-error');
  errEl.style.display = 'none';

  const username = document.getElementById('f-username').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const password = document.getElementById('f-password').value;
  const password2 = document.getElementById('f-password2').value;

  if (password !== password2) {
    errEl.textContent = 'Passwords do not match';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating account…';

  try {
    const resp = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      const msg = Array.isArray(data.detail)
        ? data.detail.map(e => e.msg).join(', ')
        : (data.detail || 'Registration failed');
      errEl.textContent = msg;
      errEl.style.display = 'block';
      return;
    }
    const meResp = await fetch('/api/auth/me', {
      headers: { 'Authorization': 'Bearer ' + data.access_token }
    });
    const user = await meResp.json();
    Auth.setSession(data.access_token, user);
    window.location.replace('/app');
  } catch (err) {
    errEl.textContent = 'Network error — is the server running?';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}
</script>

<nav class="bottom-nav">
  <a href="/" class="bnav-item">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 9.5L10 3l7 6.5V17a1 1 0 01-1 1h-4v-4H8v4H4a1 1 0 01-1-1V9.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
    Home
  </a>
  <a href="/pricing" class="bnav-item">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 3h6.2l7.5 7.5-6.2 6.2L3 9.2V3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><circle cx="7" cy="7" r="1.2" fill="currentColor"/></svg>
    Pricing
  </a>
  <a href="/login" class="bnav-item">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M13 3h4a1 1 0 011 1v12a1 1 0 01-1 1h-4M8 14l4-4-4-4M2 10h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Sign In
  </a>
  <a href="/register" class="bnav-item active">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="7" r="3.2" stroke="currentColor" stroke-width="1.5"/><path d="M2.5 18c0-3.3 2.9-5.8 6.5-5.8M14 13v6M11 16h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Register
  </a>
</nav>
</body>
</html>
