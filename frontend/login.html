<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Avalant</title>

  <link rel="icon" type="image/png" sizes="48x48" href="/avalant_favicon-48.png">
  <link rel="icon" type="image/svg+xml" href="/avalant_favicon.svg">
  <link rel="apple-touch-icon" sizes="192x192" href="/avalant_favicon-192.png">
  <link rel="stylesheet" href="/fonts/fonts.css">

  <link rel="stylesheet" href="/design.css">
  <link rel="stylesheet" href="/navbar.css">
  <style>
    /* ─── Auth-page layout ─────────────────────────────────────────── */
    body { min-height: 100vh; display: flex; flex-direction: column; }
    .auth-bg {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background:
        radial-gradient(ellipse at 50% -10%, rgba(26,255,171,0.10), transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(124,185,247,0.05), transparent 50%);
    }
    .auth-grid {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 30%, transparent 100%);
    }
    .auth-page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }
    .auth-card {
      width: 100%; max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: 40px 36px;
      box-shadow: var(--shadow-lg);
      animation: fade-in var(--dur-med) var(--ease) both;
    }
    .auth-head { text-align: center; margin-bottom: 28px; }
    .auth-mark {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border-radius: var(--r-lg);
      background: var(--green-soft);
      border: 1px solid var(--green-edge);
      margin-bottom: 18px;
    }
    .auth-mark img { width: 28px; height: 28px; }
    .auth-title {
      font-family: 'Fraunces', serif; font-weight: 400;
      font-size: 32px; line-height: 1.1; letter-spacing: -0.02em;
      color: var(--text);
    }
    .auth-sub { color: var(--text2); font-size: 14px; margin-top: 8px; }

    /* ─── Form ─────────────────────────────────────────────────────── */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 7px; letter-spacing: 0.01em; }
    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      width: 32px; height: 32px; border-radius: var(--r);
      display: flex; align-items: center; justify-content: center;
      color: var(--text3);
      transition: color var(--dur-fast), background var(--dur-fast);
    }
    .pw-toggle:hover { color: var(--text); background: var(--surface2); }

    .form-err {
      display: none; padding: 10px 12px; border-radius: var(--r);
      background: var(--red-soft); border: 1px solid var(--red-edge);
      color: var(--red); font-size: 12px; line-height: 1.4;
      margin-bottom: 12px;
    }
    .form-err.show { display: block; }

    .submit-btn { width: 100%; padding: 13px; font-size: 14px; font-weight: 700; }

    .auth-foot {
      text-align: center; margin-top: 12px; font-size: 13px; color: var(--text3);
    }
    .auth-foot a { color: var(--text); }
    .auth-foot a:hover { color: var(--green); }

    /* ─── TG divider + button ──────────────────────────────────────── */
    .tg-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 22px 0;
      color: var(--text3); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .tg-divider::before, .tg-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .tg-btn {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 12px 16px; border-radius: var(--r-pill);
      background: linear-gradient(135deg, #229ED9, #1A8BC3);
      color: #fff; font-size: 14px; font-weight: 600;
      transition: transform var(--dur-fast) var(--ease), box-shadow var(--dur-med) ease;
    }
    .tg-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px -2px rgba(34,158,217,0.45);
    }
    .tg-btn:disabled { opacity: 0.7; cursor: not-allowed; }

    .tg-status { display: none; text-align: center; margin-top: 12px; font-size: 12px; color: var(--text2); }
    .tg-err { display: none; margin-top: 10px; padding: 8px 12px; border-radius: var(--r); background: var(--red-soft); border: 1px solid var(--red-edge); color: var(--red); font-size: 12px; text-align: center; }

    /* ─── Sign-up row ──────────────────────────────────────────────── */
    .signup-row {
      text-align: center; margin-top: 22px; font-size: 13px; color: var(--text3);
    }
    .signup-row a { color: var(--green); font-weight: 600; }
    .signup-row a:hover { text-decoration: underline; }

    /* ─── Mobile bottom nav (preserved from old login) ─────────────── */
    .bottom-nav {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(10,10,13,0.92);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      padding: 8px 4px calc(env(safe-area-inset-bottom, 0) + 8px);
      gap: 4px; z-index: 50;
    }
    .bottom-nav a {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 8px 4px; color: var(--text3); font-size: 10px; font-weight: 500;
      border-radius: var(--r);
      transition: color var(--dur-fast), background var(--dur-fast);
    }
    .bottom-nav a:hover, .bottom-nav a.active { color: var(--green); background: var(--green-soft); }

    @media (max-width: 900px) {
      .auth-card { padding: 28px 22px; max-width: none; }
      .auth-title { font-size: 26px; }
      .auth-page { padding: 24px 16px 84px; }
      .bottom-nav { display: flex; }
    }
  </style>
</head>
<body>

<div class="auth-bg"></div>
<div class="auth-grid"></div>

<header class="topbar"><app-navbar page="login"></app-navbar></header>

<main class="auth-page">
  <div class="auth-card">

    <div class="auth-head">
      <div class="auth-mark"><img src="/avalant-logo.svg" alt="Avalant"></div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to continue</p>
    </div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="f-login">Email or username</label>
        <input id="f-login" class="input" type="text" placeholder="you@example.com" autocomplete="username" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="f-password">Password</label>
        <div class="pw-wrap">
          <input id="f-password" class="input" type="password" placeholder="••••••••" autocomplete="current-password" required style="padding-right:46px">
          <button type="button" class="pw-toggle" onclick="togglePw('f-password',this)" tabindex="-1" aria-label="Show password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div id="login-error" class="form-err"></div>
      <button type="submit" class="btn btn-primary submit-btn" id="btn-submit">Sign in</button>
      <div class="auth-foot">
        <a href="/password-reset">Forgot password?</a>
      </div>
    </form>

    <!-- TOTP challenge form -->
    <form id="totp-form" onsubmit="handleTotp(event)" style="display:none">
      <div class="form-group">
        <label class="form-label">Two-factor code</label>
        <input id="f-totp" class="input mono" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="123456" autocomplete="one-time-code" required style="letter-spacing:0.18em;text-align:center;font-size:18px">
      </div>
      <div id="totp-error" class="form-err"></div>
      <button type="submit" class="btn btn-primary submit-btn" id="btn-totp">Verify code</button>
      <div class="auth-foot">
        <a href="#" onclick="cancelTotp(event)">← Use a different account</a>
      </div>
    </form>

    <div class="tg-divider"><span>or</span></div>

    <div class="tg-login-wrap">
      <button type="button" id="tg-bot-btn" class="tg-btn" onclick="startTgBotLogin()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M21.5 3.5L2.9 10.7c-1.3.5-1.3 1.4-.2 1.7l4.7 1.5 1.8 5.6c.2.7.1.9.8.9.6 0 .8-.3 1.1-.5l2.7-2.6 5.7 4.2c1 .6 1.8.3 2-.9l3.6-17c.3-1.4-.5-2-1.6-1.6z"/></svg>
        Sign in with Telegram
      </button>
      <a id="google-btn" href="/api/auth/google/authorize?next=/portfolio" class="tg-btn" style="display:none;background:#fff;color:#3c4043;border:1px solid #dadce0;margin-top:8px;text-decoration:none">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Sign in with Google
      </a>
      <div id="tg-login-status" class="tg-status"></div>
      <div id="tg-login-err" class="tg-err"></div>
    </div>

    <div class="signup-row">
      Don't have an account? <a href="/register">Create one</a>
    </div>
    <div class="signup-row" style="font-size:11.5px;color:var(--text3);margin-top:6px">
      <a href="/terms" style="color:inherit">Terms</a> · <a href="/privacy" style="color:inherit">Privacy</a>
    </div>

  </div>
</main>

<nav class="bottom-nav">
  <a href="/" >
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M3 9.5L10 3l7 6.5V17a1 1 0 01-1 1h-4v-4H8v4H4a1 1 0 01-1-1V9.5z"/></svg>
    Home
  </a>
  <a href="/pricing">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M3 3h6.2l7.5 7.5-6.2 6.2L3 9.2V3z"/><circle cx="7" cy="7" r="1.2" fill="currentColor"/></svg>
    Pricing
  </a>
  <a href="/login" class="active">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 3h4a1 1 0 011 1v12a1 1 0 01-1 1h-4M8 14l4-4-4-4M2 10h10"/></svg>
    Sign in
  </a>
  <a href="/register">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="9" cy="7" r="3.2"/><path d="M2.5 18c0-3.3 2.9-5.8 6.5-5.8M14 13v6M11 16h6"/></svg>
    Register
  </a>
</nav>

<!-- Shared modules bundled — see frontend/build.mjs. -->
<script src="/dist/core.min.js?v=20260609c"></script>
<script>
Auth.redirectIfAuthed('/screener');

// Google OAuth: show the button only if the server has it configured.
// Status endpoint returns {enabled: bool} — single round-trip, no creds.
(async function _initGoogleBtn(){
  try {
    const r = await fetch('/api/auth/google/status');
    if (!r.ok) return;
    const j = await r.json();
    if (j.enabled) {
      const btn = document.getElementById('google-btn');
      if (btn) btn.style.display = '';
    }
  } catch {}
})();

// Surface Google OAuth callback errors via ?google_error=... — readable
// reason picked from a small allowlist + fallback.
(function _showGoogleErr(){
  const params = new URLSearchParams(location.search);
  const err = params.get('google_error');
  if (!err) return;
  const errEl = document.getElementById('tg-login-err') || document.getElementById('error');
  if (!errEl) return;
  const reasons = {
    bad_state:        'Sign-in expired or was tampered with. Please try again.',
    exchange_failed:  'Google rejected the sign-in. Try again.',
    db_failed:        'Could not create or sign in to your account. Try again.',
    missing_params:   'The Google sign-in flow was interrupted. Try again.',
    access_denied:    'You denied access to Google sign-in.',
  };
  errEl.textContent = reasons[err] || 'Google sign-in failed: ' + err;
  errEl.classList.add('show');
})();

function togglePw(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.style.color = el.type === 'text' ? 'var(--green)' : '';
}

let _totpChallenge = null;

function cancelTotp(e) {
  if (e) e.preventDefault();
  _totpChallenge = null;
  document.getElementById('totp-form').style.display = 'none';
  document.getElementById('login-form').style.display = '';
  document.querySelector('.tg-divider').style.display = '';
  document.querySelector('.tg-login-wrap').style.display = '';
  document.getElementById('totp-error').classList.remove('show');
  document.getElementById('f-totp').value = '';
}

async function handleTotp(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-totp');
  const errEl = document.getElementById('totp-error');
  const code = (document.getElementById('f-totp').value || '').trim();
  errEl.classList.remove('show');
  if (!_totpChallenge) {
    errEl.textContent = 'Sign-in expired. Refresh and try again.';
    errEl.classList.add('show');
    return;
  }
  btn.disabled = true; btn.textContent = 'Verifying…';
  let cooldown = false;
  try {
    const r = await fetch('/api/auth/login/totp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ challenge: _totpChallenge, code }),
    });
    const j = await r.json();
    if (!r.ok) {
      if (r.status === 429) {
        const ra = parseInt(r.headers.get('Retry-After') || '0', 10);
        if (ra > 0) {
          cooldown = true;
          errEl.textContent = j.detail || 'Too many attempts.';
          errEl.classList.add('show');
          let left = ra;
          btn.disabled = true; btn.textContent = `Retry in ${left}s`;
          const tick = setInterval(() => {
            left--;
            if (left <= 0) { clearInterval(tick); btn.disabled = false; btn.textContent = 'Verify code'; return; }
            btn.textContent = `Retry in ${left}s`;
          }, 1000);
          return;
        }
      }
      errEl.textContent = j.detail || 'Invalid code';
      errEl.classList.add('show');
      return;
    }
    const meR = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + j.access_token } });
    const me = meR.ok ? await meR.json() : { username: 'user' };
    Auth.setSession(j.access_token, me);
    const params = new URLSearchParams(window.location.search);
    window.location.replace((params.get('next') || '/portfolio').replace(/\.html$/, ''));
  } catch (err) {
    errEl.textContent = err.message || 'Network error';
    errEl.classList.add('show');
  } finally {
    if (!cooldown) { btn.disabled = false; btn.textContent = 'Verify code'; }
  }
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-submit');
  const errEl = document.getElementById('login-error');
  errEl.classList.remove('show');
  btn.disabled = true; btn.textContent = 'Signing in…';
  let cooldownActive = false;

  const login = document.getElementById('f-login').value.trim();
  const password = document.getElementById('f-password').value;

  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login, password }),
    });
    const data = await resp.json();
    if (resp.ok && data.token_type === 'totp_challenge') {
      _totpChallenge = data.access_token;
      document.getElementById('login-form').style.display = 'none';
      document.querySelector('.tg-divider').style.display = 'none';
      document.querySelector('.tg-login-wrap').style.display = 'none';
      document.getElementById('totp-form').style.display = '';
      document.getElementById('f-totp').focus();
      return;
    }
    if (!resp.ok) {
      if (resp.status === 429) {
        const ra = parseInt(resp.headers.get('Retry-After') || '0', 10);
        if (ra > 0) {
          errEl.textContent = data.detail || 'Too many attempts.';
          errEl.classList.add('show');
          cooldownActive = true;
          let left = ra;
          btn.disabled = true; btn.textContent = `Retry in ${left}s`;
          const tick = setInterval(() => {
            left--;
            if (left <= 0) { clearInterval(tick); btn.disabled = false; btn.textContent = 'Sign in'; return; }
            btn.textContent = `Retry in ${left}s`;
          }, 1000);
          return;
        }
      }
      errEl.textContent = data.detail || 'Login failed';
      errEl.classList.add('show');
      return;
    }
    const meResp = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + data.access_token } });
    if (!meResp.ok) {
      errEl.textContent = 'Auth error: ' + meResp.status;
      errEl.classList.add('show');
      return;
    }
    const user = await meResp.json();
    Auth.setSession(data.access_token, user);
    const params = new URLSearchParams(window.location.search);
    window.location.replace((params.get('next') || '/portfolio').replace(/\.html$/, ''));
  } catch (err) {
    errEl.textContent = err.message || 'Network error';
    errEl.classList.add('show');
  } finally {
    if (!cooldownActive) { btn.disabled = false; btn.textContent = 'Sign in'; }
  }
}

/* ─── Telegram bot login ──────────────────────────────────────────── */
let _tgLoginPoll = null;
async function startTgBotLogin(){
  const btn = document.getElementById('tg-bot-btn');
  const status = document.getElementById('tg-login-status');
  const err = document.getElementById('tg-login-err');
  err.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Generating link…';

  // Reserve popup synchronously to survive iOS pop-up policies
  const _popup = window.open('about:blank', '_blank');

  try {
    const r = await fetch('/api/auth/tg-bot-login', { method: 'POST', headers: { 'Content-Type': 'application/json' } });
    if (!r.ok) throw new Error('Failed to generate login link');
    const j = await r.json();

    if (_popup && !_popup.closed) {
      _popup.location.href = j.deep_link;
    } else {
      window.location.href = j.deep_link;
      return;
    }

    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M21.5 3.5L2.9 10.7c-1.3.5-1.3 1.4-.2 1.7l4.7 1.5 1.8 5.6c.2.7.1.9.8.9.6 0 .8-.3 1.1-.5l2.7-2.6 5.7 4.2c1 .6 1.8.3 2-.9l3.6-17c.3-1.4-.5-2-1.6-1.6z"/></svg> Waiting for Telegram…';
    status.innerHTML = 'Press <b>START</b> in the bot — it will send a button to finish login.';
    status.style.display = 'block';

    const token = j.token;
    const started = Date.now();
    if (_tgLoginPoll) clearInterval(_tgLoginPoll);
    _tgLoginPoll = setInterval(async () => {
      if (Date.now() - started > 300000) {
        clearInterval(_tgLoginPoll); _tgLoginPoll = null;
        _resetTgBtn();
        err.textContent = 'Login expired. Try again.';
        err.style.display = 'block';
        return;
      }
      try {
        const cr = await fetch('/api/auth/tg-bot-login?token=' + encodeURIComponent(token));
        const cj = await cr.json();
        if (cj.status === 'ok' && cj.access_token) {
          clearInterval(_tgLoginPoll); _tgLoginPoll = null;
          const meResp = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + cj.access_token } });
          const me = meResp.ok ? await meResp.json() : { id: cj.user_id, username: cj.username || 'user', email: '' };
          Auth.setSession(cj.access_token, me);
          const params = new URLSearchParams(window.location.search);
          window.location.replace((params.get('next') || '/portfolio').replace(/\.html$/, ''));
        } else if (cj.status === 'expired') {
          clearInterval(_tgLoginPoll); _tgLoginPoll = null;
          _resetTgBtn();
        }
      } catch {}
    }, 2000);
  } catch (e) {
    err.textContent = e.message || 'Error';
    err.style.display = 'block';
    _resetTgBtn();
  }
}

function _resetTgBtn() {
  const btn = document.getElementById('tg-bot-btn');
  if (!btn) return;
  btn.disabled = false;
  btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M21.5 3.5L2.9 10.7c-1.3.5-1.3 1.4-.2 1.7l4.7 1.5 1.8 5.6c.2.7.1.9.8.9.6 0 .8-.3 1.1-.5l2.7-2.6 5.7 4.2c1 .6 1.8.3 2-.9l3.6-17c.3-1.4-.5-2-1.6-1.6z"/></svg> Sign in with Telegram';
  document.getElementById('tg-login-status').style.display = 'none';
}
</script>

<app-footer></app-footer>
</body>
</html>
