<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="icon" type="image/png" sizes="48x48" href="/avalant_favicon-48.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/avalant_favicon-96.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/avalant_favicon-192.png">
  <link rel="icon" type="image/svg+xml" href="/avalant_favicon.svg">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="192x192" href="/avalant_favicon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Avalant</title>
  <link rel="stylesheet" href="/navbar.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0E0E11;
      --surface:   #131217;
      --surface2:  #17171C;
      --surface3:  #202028;
      --border:    #22222A;
      --text:      #E6E8E3;
      --text2:     #9B9FAB;
      --text3:     #676B7E;
      --text4:     #393B47;
      --green:     #1AFFAB;
      --green-dim: rgba(26,255,171,0.08);
      --green-glow:rgba(26,255,171,0.2);
      --teal:      #06B6D4;
      --red:       #F87171;
      --red-dim:   rgba(248,113,113,0.08);
      --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::selection { background: var(--green-dim); color: var(--green); }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .page-center {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
    }

    /* BG grid */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 40%, black 30%, transparent 100%);
    }
    /* glow */
    body::after {
      content: '';
      position: fixed; top: -150px; left: 50%; transform: translateX(-50%);
      width: 700px; height: 400px; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse, rgba(26,255,171,0.06) 0%, transparent 70%);
    }

    
    .topbar-right .btn-primary {
      border-radius: 8px;
      height: 30px;
      padding: 0 12px;
      font-size: 13px;
      transition: box-shadow 0.2s, background 0.15s;
    }
    .topbar-right .btn-primary:hover { color: #09090B;
      background: #00E89A;
      box-shadow: 0 0 14px rgba(26,255,171,0.35);
      transform: none;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0 14px; height: 34px; border-radius: 99px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text2); cursor: pointer;
      font-family: var(--font); font-size: 13px; font-weight: 500;
      transition: all 0.15s ease; white-space: nowrap; user-select: none;
      text-decoration: none;
    }
    .btn-primary {
      background: var(--green); border-color: var(--green); color: #09090B; font-weight: 500;
    }
    .btn-primary:hover {
      background: #00E89A; border-color: #00E89A;
      box-shadow: 0 0 20px rgba(26,255,171,0.25); transform: translateY(-1px);
    }
    .btn-sm { padding: 0 10px; height: 28px; font-size: 12px; }

    /* ── CARD ── */
    .card {
      position: relative; z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 40px;
      width: 100%; max-width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: cardIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(26,255,171,0.15), transparent);
      border-radius: 16px 16px 0 0;
    }

    .card-logo {
      display: flex; justify-content: center; margin-bottom: 28px;
    }
    .logo-mark {
      width: 64px; height: 64px; border-radius: 16px; overflow: hidden;
    }
    .logo-mark img { width: 100%; height: 100%; display: block; }

    .card-title {
      text-align: center;
      font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .card-sub {
      text-align: center;
      font-size: 13px; color: var(--text3);
      margin-bottom: 28px;
    }

    /* ── FORM ── */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--text3); margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 10px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text); font-family: var(--font); font-size: 14px;
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(26,255,171,0.1);
    }
    .form-input::placeholder { color: var(--text4); }

    .pw-wrap { position: relative; }
    .pw-wrap .form-input { padding-right: 40px; }
    .pw-toggle {
      position: absolute; right: 11px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 2px;
      color: var(--text3); display: flex; align-items: center;
    }
    .pw-toggle:hover { color: var(--text); }

    .form-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 6px;
    }
    .form-link {
      font-size: 12px; color: var(--text3);
      text-decoration: none; transition: color 0.12s;
    }
    .form-link:hover { color: var(--green); }

    .tg-divider { display:flex; align-items:center; gap:10px; margin:16px 0 10px; color:var(--text3); font-size:10.5px; text-transform:uppercase; letter-spacing:0.1em; font-weight:600; }
    .tg-divider::before, .tg-divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .tg-login-wrap { margin-bottom: 14px; }
    .btn-submit {
      width: 100%; height: 44px;
      background: var(--green); color: #09090B;
      border: none; border-radius: 8px;
      font-family: var(--font); font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
      margin-top: 6px;
    }
    .btn-submit:hover {
      background: #00E89A;
      box-shadow: 0 0 28px var(--green-glow);
      transform: translateY(-1px);
    }
    .btn-submit:active { transform: translateY(0); box-shadow: none; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--text4); font-size: 11px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .demo-note {
      background: var(--green-dim);
      border: 1px solid rgba(26,255,171,0.15);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px; color: var(--text2);
      margin-top: 16px;
      text-align: center;
    }
    .demo-note strong { color: var(--green); }

    .signup-row {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: var(--text3);
    }
    .signup-row a {
      color: var(--green); text-decoration: none; font-weight: 500;
    }
    .signup-row a:hover { text-decoration: underline; }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      display: none;
      position: fixed; bottom: 12px; left: 12px; right: 12px; height: 64px;
      background: rgba(13,13,16,0.82);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.07); border-radius: 20px;
      z-index: 300; align-items: center; justify-content: space-around; padding: 0 4px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .bnav-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 8px 14px; border-radius: 12px; text-decoration: none; color: var(--text3);
      font-size: 10px; font-weight: 500; transition: color 0.15s; flex: 1; max-width: 80px;
    }
    .bnav-item svg { flex-shrink: 0; opacity: 0.45; transition: opacity 0.15s; }
    .bnav-item:hover { color: var(--text2); }
    .bnav-item:hover svg { opacity: 0.7; }
    .bnav-item.active { color: var(--green); }
    .bnav-item.active svg { opacity: 1; }

    @media (max-width: 768px) {
      .bottom-nav { display: flex; }
      body { padding-bottom: 88px; }
      .page-center { padding: 24px 16px; }
    }
  
    /* ── Free Banner ── */
    .free-banner {
      position: fixed;
      top: 60px;
      left: 12px;
      right: 12px;
      z-index: 98;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 9px 20px;
      background: rgba(14,14,17,0.92);
      border: 1px solid rgba(26,255,171,0.18);
      border-radius: 12px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      font-size: 13px;
      color: var(--text2);
      letter-spacing: 0.01em;
      animation: bannerIn 0.45s cubic-bezier(0.16,1,0.3,1) both;
      animation-delay: 0.7s;
      opacity: 0;
    }
    .free-banner-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 7px rgba(26,255,171,0.65);
      flex-shrink: 0;
    }
    .free-banner em { font-style: normal; color: var(--text); font-weight: 500; }
    .free-banner-close {
      position: absolute;
      right: 12px;
      background: none; border: none;
      color: var(--text3); font-size: 15px; line-height: 1;
      cursor: pointer; padding: 4px 5px; border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .free-banner-close:hover { color: var(--text); background: var(--surface3); }
    @keyframes bannerIn {
      from { transform: translateY(-14px); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }

    </style>
</head>
<body>

<header class="topbar"><app-navbar page="login"></app-navbar></header>



<div class="page-center">
<div class="card">
  <div class="card-logo">
    <div class="logo-mark"><img src="/avalant-logo.svg" alt="Avalant"></div>
  </div>

  <div class="card-title">Welcome back</div>
  <div class="card-sub">Sign in to your avalant</div>

  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label">Email or username</label>
      <input id="f-login" class="form-input" type="text" placeholder="you@example.com" autocomplete="username" required>
    </div>

    <div class="form-group">
      <div class="form-row">
        <label class="form-label" style="margin:0">Password</label>
      </div>
      <div class="pw-wrap">
        <input id="f-password" class="form-input" type="password" placeholder="••••••••" autocomplete="current-password" required>
        <button type="button" class="pw-toggle" onclick="togglePw('f-password',this)" tabindex="-1" aria-label="Show password">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <div id="login-error" style="display:none;color:var(--red);font-size:12px;margin-bottom:10px;padding:8px 10px;background:var(--red-dim);border-radius:7px;"></div>

    <button type="submit" class="btn-submit" id="btn-submit">Sign in</button>
  </form>

  <div class="tg-divider"><span>or</span></div>

  <div class="tg-login-wrap">
    <div id="tg-login-btn" style="display:flex;justify-content:center;min-height:44px;align-items:center">
      <span style="color:var(--text3);font-size:12px">Loading Telegram…</span>
    </div>
    <div id="tg-login-err" style="display:none;color:var(--red);font-size:12px;margin-top:8px;text-align:center"></div>
  </div>

  <div class="signup-row">
    Don't have an account? <a href="/register">Create one</a>
  </div>
</div>
</div>

<nav class="bottom-nav">
  <a href="/" class="bnav-item">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 9.5L10 3l7 6.5V17a1 1 0 01-1 1h-4v-4H8v4H4a1 1 0 01-1-1V9.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
    Home
  </a>
  <a href="/pricing" class="bnav-item">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 3h6.2l7.5 7.5-6.2 6.2L3 9.2V3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><circle cx="7" cy="7" r="1.2" fill="currentColor"/></svg>
    Pricing
  </a>
  <a href="/login" class="bnav-item active">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M13 3h4a1 1 0 011 1v12a1 1 0 01-1 1h-4M8 14l4-4-4-4M2 10h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Sign In
  </a>
  <a href="/register" class="bnav-item">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="7" r="3.2" stroke="currentColor" stroke-width="1.5"/><path d="M2.5 18c0-3.3 2.9-5.8 6.5-5.8M14 13v6M11 16h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Register
  </a>
</nav>

<script src="/navbar.js"></script>
<script src="/auth.js"></script>
<script src="/toast.js"></script>
<script src="/theme.js"></script>
<script>
Auth.redirectIfAuthed('/app');

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.innerHTML = show
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-submit');
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const login = document.getElementById('f-login').value.trim();
  const password = document.getElementById('f-password').value;

  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ login, password }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      errEl.textContent = data.detail || 'Login failed';
      errEl.style.display = 'block';
      return;
    }
    // Fetch user profile
    const meResp = await fetch('/api/auth/me', {
      headers: { 'Authorization': 'Bearer ' + data.access_token }
    });
    if (!meResp.ok) {
      errEl.textContent = 'Auth error: ' + meResp.status;
      errEl.style.display = 'block';
      return;
    }
    const user = await meResp.json();
    Auth.setSession(data.access_token, user);
    const params = new URLSearchParams(window.location.search);
    window.location.replace((params.get('next') || '/app').replace(/\.html$/, ''));
  } catch (err) {
    errEl.textContent = err.message || 'Network error';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}

// ── Telegram Login widget ────────────────────────────────────────────────
// Skip on localhost — widget only works when bot domain is set in BotFather
// and domain matches window.location.hostname. On localhost this usually
// causes the widget to fail or (worse) trigger redirect loops.
(function(){
  const host = document.getElementById('tg-login-btn');
  if (!host) return;
  const h = window.location.hostname;
  if (h === 'localhost' || h === '127.0.0.1' || h === '0.0.0.0') {
    host.innerHTML = `
      <div style="text-align:center;font-size:11px;line-height:1.5;color:var(--text3)">
        Telegram login is only available on a public domain.<br>
        Run <code style="color:var(--text);background:var(--surface2);padding:1px 5px;border-radius:3px">/setdomain</code> in BotFather for your production host.
      </div>`;
    return;
  }
  const script = document.createElement('script');
  script.async = true;
  script.src = 'https://telegram.org/js/telegram-widget.js?22';
  script.dataset.telegramLogin = 'avalant_bot';
  script.dataset.size = 'large';
  script.dataset.radius = '9';
  script.dataset.onauth = 'onTelegramAuth(user)';
  script.dataset.requestAccess = 'write';
  host.innerHTML = '';
  host.appendChild(script);
  setTimeout(() => {
    if (!host.querySelector('iframe')) {
      host.innerHTML = `
        <div style="text-align:center;font-size:11px;line-height:1.5;color:var(--text3)">
          Telegram login not available on this domain.<br>
          Run <code style="color:var(--text);background:var(--surface2);padding:1px 5px;border-radius:3px">/setdomain</code> for <b>@avalant_bot</b> in BotFather.
        </div>`;
    }
  }, 6000);
})();

async function onTelegramAuth(user){
  const err = document.getElementById('tg-login-err');
  err.style.display = 'none';
  try {
    const r = await fetch('/api/auth/tg-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(user),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.detail || 'Telegram login failed');
    // Fetch full profile to populate localStorage
    const meResp = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + j.access_token } });
    const me = meResp.ok ? await meResp.json() : { id: user.id, username: user.username || ('tg_' + user.id), email: '' };
    Auth.setSession(j.access_token, me);
    const params = new URLSearchParams(window.location.search);
    window.location.replace((params.get('next') || '/app').replace(/\.html$/, ''));
  } catch (e) {
    err.textContent = e.message || 'Telegram login error';
    err.style.display = 'block';
  }
}
</script>
</body>
</html>
