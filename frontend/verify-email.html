<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/avalant_favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Verify email — Avalant</title>
  <link rel="stylesheet" href="/fonts/fonts.css">
  <link rel="stylesheet" href="/design.css">
  <style>
    body { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(26,255,171,0.06), transparent 70%),
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px) 0 0/100% 64px,
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px) 0 0/64px 100%;
    }
    .auth-shell { position: relative; z-index: 1; width: 100%; max-width: 440px; }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-xl); padding: 40px 32px;
      box-shadow: var(--shadow-lg);
      text-align: center;
      animation: fade-up var(--dur-med) var(--ease) both;
    }
    @keyframes fade-up { from { opacity:0; transform: translateY(8px) } to { opacity:1; transform:none } }
    .auth-mark {
      width: 56px; height: 56px; margin: 0 auto 24px;
      background: var(--green-soft); border: 1px solid var(--green-edge);
      border-radius: var(--r-lg); display: grid; place-items: center;
      color: var(--green);
      transition: background var(--dur-med) ease, border-color var(--dur-med) ease, color var(--dur-med) ease;
    }
    .auth-mark.err { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.3); color: var(--red); }
    .auth-mark.pending { background: rgba(229,192,123,0.08); border-color: rgba(229,192,123,0.3); color: var(--yellow); }
    .auth-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 32px; font-weight: 400; letter-spacing: -0.02em;
      margin: 0 0 8px;
    }
    .state-msg { color: var(--text2); font-size: 14px; line-height: 1.55; margin: 0 0 24px; }
    .state-msg.ok { color: var(--green); }
    .state-msg.err { color: var(--red); }
    .spinner-lg {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--yellow);
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 600px) {
      .auth-card { padding: 32px 22px; border-radius: var(--r-lg); }
      .auth-title { font-size: 28px; }
    }
  </style>
<script src="/banner.js" defer></script>
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-mark pending" id="mark">
        <div class="spinner-lg"></div>
      </div>
      <h1 class="auth-title" id="title">Confirming…</h1>
      <p class="state-msg" id="msg">Verifying your email address.</p>
      <div id="action"></div>
    </div>
  </div>
<script>
const mark = document.getElementById('mark');
const title = document.getElementById('title');
const msg = document.getElementById('msg');
const action = document.getElementById('action');
const token = new URLSearchParams(location.search).get('token') || '';

const ICON_OK = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';
const ICON_ERR = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>';

function setOk(text) {
  mark.className = 'auth-mark'; mark.innerHTML = ICON_OK;
  title.textContent = 'Email confirmed';
  msg.className = 'state-msg ok'; msg.textContent = text;
  action.innerHTML = '<a class="btn btn-primary btn-lg" href="/portfolio" style="width:100%">Continue to app</a>';
}
function setErr(text) {
  mark.className = 'auth-mark err'; mark.innerHTML = ICON_ERR;
  title.textContent = 'Verification failed';
  msg.className = 'state-msg err'; msg.textContent = text;
  action.innerHTML = '<a class="btn btn-outline btn-lg" href="/portfolio" style="width:100%">Back to app</a>';
}

async function run() {
  if (!token) {
    setErr('Missing token — open the link from your email.');
    return;
  }
  try {
    const r = await fetch('/api/auth/email-verify/confirm', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ token }),
    });
    const j = await r.json();
    if (r.ok) setOk('Your email is now verified.');
    else setErr(j.detail || 'Verification failed');
  } catch (err) {
    setErr('Network error — please try again');
  }
}
run();
</script>
</body>
</html>
