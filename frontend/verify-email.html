<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/avalant_favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify email — Avalant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0E0E11; --surface:#131217; --border:#22222A; --text:#E6E8E3; --text2:#9B9FAB; --text3:#676B7E; --green:#1AFFAB; --red:#F87171; --yellow:#E5C07B; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:420px;text-align:center}
    .brand{font-weight:800;font-size:22px;color:var(--green);margin-bottom:6px}
    .brand::after{content:'_';animation:blink 1.1s steps(2,start) infinite}
    @keyframes blink{to{visibility:hidden}}
    h1{font-size:18px;font-weight:700;margin-bottom:10px}
    .state{margin:20px 0;padding:24px;border-radius:12px;font-size:14px}
    .state.pending{background:rgba(229,192,123,.08);border:1px solid rgba(229,192,123,.3);color:var(--yellow)}
    .state.ok{background:rgba(26,255,171,.08);border:1px solid rgba(26,255,171,.3);color:var(--green)}
    .state.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);color:var(--red)}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--yellow);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    a{color:var(--green);text-decoration:none}
    .muted{color:var(--text3);font-size:12px}
  </style>
<script src="/banner.js" defer></script>
</head>
<body>
  <div class="card">
    <div class="brand">avalant</div>
    <h1>Confirm your email</h1>
    <div id="state" class="state pending"><span class="spinner"></span>Verifying…</div>
    <div class="muted" id="action"></div>
  </div>
<script>
const state = document.getElementById('state');
const action = document.getElementById('action');
const token = new URLSearchParams(location.search).get('token') || '';

async function run() {
  if (!token) {
    state.className = 'state err';
    state.textContent = 'Missing token. Use the link from your email.';
    action.innerHTML = '<a href="/app">← Back to app</a>';
    return;
  }
  try {
    const r = await fetch('/api/auth/email-verify/confirm', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ token }),
    });
    const j = await r.json();
    if (r.ok) {
      state.className = 'state ok';
      state.textContent = '✓ Email confirmed.';
      action.innerHTML = '<a href="/app">→ Continue to app</a>';
    } else {
      state.className = 'state err';
      state.textContent = j.detail || 'Verification failed';
      action.innerHTML = '<a href="/app">← Back to app</a>';
    }
  } catch (err) {
    state.className = 'state err';
    state.textContent = 'Network error';
    action.innerHTML = '<a href="/app">← Back to app</a>';
  }
}
run();
</script>
</body>
</html>
