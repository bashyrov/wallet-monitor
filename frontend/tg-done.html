<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Signing you in… · Avalant</title>
<link rel="icon" type="image/svg+xml" href="/avalant_favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/design.css">
<style>
  body { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(26,255,171,0.06), transparent 70%),
      linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px) 0 0/100% 64px,
      linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px) 0 0/64px 100%;
  }
  .auth-shell { position: relative; z-index: 1; width: 100%; max-width: 420px; }
  .auth-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r-xl); padding: 40px 32px;
    box-shadow: var(--shadow-lg); text-align: center;
    animation: fade-up var(--dur-med) var(--ease) both;
  }
  @keyframes fade-up { from { opacity:0; transform: translateY(8px) } to { opacity:1; transform:none } }
  .auth-mark {
    width: 56px; height: 56px; margin: 0 auto 24px;
    background: var(--green-soft); border: 1px solid var(--green-edge);
    border-radius: var(--r-lg); display: grid; place-items: center;
    color: var(--green);
    transition: background var(--dur-med) ease, border-color var(--dur-med) ease, color var(--dur-med) ease;
  }
  .auth-mark.err { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.3); color: var(--red); }
  .spinner-lg {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .auth-title {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 28px; font-weight: 400; letter-spacing: -0.02em;
    margin: 0 0 8px;
  }
  .auth-sub { color: var(--text2); font-size: 14px; line-height: 1.55; margin: 0; }
  .err { color: var(--red); font-size: 13px; margin-top: 16px; line-height: 1.55; }
  @media (max-width: 600px) {
    .auth-card { padding: 32px 22px; border-radius: var(--r-lg); }
    .auth-title { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-mark" id="mark"><div class="spinner-lg" id="sp"></div></div>
    <h1 class="auth-title" id="title">Signing you in…</h1>
    <p class="auth-sub" id="sub">One moment.</p>
    <div id="err" class="err" style="display:none"></div>
    <a id="retry" class="btn btn-primary btn-lg" href="/login" style="display:none; margin-top:20px; width:100%">Back to login</a>
  </div>
</div>
<script src="/banner.js" defer></script>
<script src="/auth.js"></script>
<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const t = params.get('t');
  const ICON_ERR = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>';
  const fail = (msg) => {
    document.getElementById('mark').className = 'auth-mark err';
    document.getElementById('mark').innerHTML = ICON_ERR;
    document.getElementById('title').textContent = 'Login failed';
    document.getElementById('sub').style.display = 'none';
    const e = document.getElementById('err'); e.textContent = msg; e.style.display = 'block';
    document.getElementById('retry').style.display = 'inline-flex';
  };
  if (!t) return fail('Missing login token.');
  try {
    const r = await fetch('/api/auth/tg-bot-login?token=' + encodeURIComponent(t), {
      credentials: 'include', cache: 'no-store',
    });
    if (!r.ok) {
      console.error('[tg-done] poll http', r.status, await r.text());
      return fail(`Server returned ${r.status}. Try again or generate a fresh link.`);
    }
    const j = await r.json();
    console.debug('[tg-done] poll →', j.status);
    if (j.status === 'pending') {
      return fail('Press Start in the bot first, then come back here.');
    }
    if (j.status === 'blocked') {
      return fail('Account is blocked. Contact support.');
    }
    if (j.status === 'expired') {
      return fail('This link has expired. Open the bot and tap Start again.');
    }
    if (j.status !== 'ok' || !j.access_token) {
      return fail(`Login failed (status: ${j.status || 'unknown'}). Generate a fresh link.`);
    }
    let me;
    try {
      const meR = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + j.access_token } });
      me = meR.ok ? await meR.json() : { id: j.user_id, username: j.username || 'user', email: '' };
    } catch (_) {
      me = { id: j.user_id, username: j.username || 'user', email: '' };
    }
    if (typeof Auth === 'undefined' || typeof Auth.setSession !== 'function') {
      return fail('Auth library failed to load. Refresh the page.');
    }
    Auth.setSession(j.access_token, me);
    location.replace('/portfolio');
  } catch (e) {
    console.error('[tg-done] flow error:', e);
    fail('Network error: ' + (e && e.message || 'unknown'));
  }
})();
</script>
</body>
</html>
