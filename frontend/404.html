<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="icon" type="image/png" sizes="48x48" href="/avalant_favicon-48.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/avalant_favicon-96.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/avalant_favicon-192.png">
  <link rel="icon" type="image/svg+xml" href="/avalant_favicon.svg">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="192x192" href="/avalant_favicon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Avalant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0E0E11;
      --surface: #131217;
      --border:  #22222A;
      --text:    #E6E8E3;
      --text2:   #9B9FAB;
      --text3:   #676B7E;
      --green:   #1AFFAB;
      --mono:    'JetBrains Mono', monospace;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: Inter, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── Grid background ── */
    .grid-bg {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(26,255,171,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,255,171,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
    }

    /* ── Glow ── */
    .glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(26,255,171,0.06) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 0;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.08); }
    }

    /* ── Content ── */
    .content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      text-align: center; padding: 24px;
      gap: 0;
    }

    /* ── 404 Number ── */
    .num {
      font-family: var(--mono);
      font-size: clamp(96px, 20vw, 180px);
      font-weight: 500;
      line-height: 1;
      color: transparent;
      background: linear-gradient(135deg, var(--green) 0%, rgba(26,255,171,0.3) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      letter-spacing: -4px;
      animation: fadeSlideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
      position: relative;
    }
    .num::after {
      content: '404';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--green) 0%, rgba(26,255,171,0.3) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: blur(28px);
      opacity: 0.4;
      z-index: -1;
    }

    /* ── Terminal block ── */
    .terminal {
      margin-top: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      font-family: var(--mono);
      font-size: 13px;
      text-align: left;
      width: 100%;
      max-width: 420px;
      animation: fadeSlideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }
    .terminal-bar {
      display: flex; gap: 6px; margin-bottom: 12px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-r { background: #FF5F57; }
    .dot-y { background: #FFBD2E; }
    .dot-g { background: #28CA41; }
    .t-line { color: var(--text3); line-height: 1.9; }
    .t-line .prompt { color: var(--green); }
    .t-line .cmd    { color: var(--text2); }
    .t-line .err    { color: #F87171; }
    .t-line .ok     { color: var(--green); }
    .cursor {
      display: inline-block; width: 7px; height: 14px;
      background: var(--green); vertical-align: middle;
      animation: blink 1.1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Tagline ── */
    .tagline {
      margin-top: 24px;
      font-size: 14px; color: var(--text3); line-height: 1.6;
      max-width: 320px;
      animation: fadeSlideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.2s both;
    }

    /* ── CTA ── */
    .cta-row {
      margin-top: 28px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
      animation: fadeSlideUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.3s both;
    }
    .btn-home {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 0 20px; height: 40px; border-radius: 10px;
      background: var(--green); color: #09090B;
      font-size: 13px; font-weight: 600;
      text-decoration: none; transition: background 0.15s, transform 0.15s;
    }
    .btn-home:hover { background: #00E89A; transform: translateY(-1px); }
    .btn-back {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 0 20px; height: 40px; border-radius: 10px;
      background: transparent; color: var(--text2);
      border: 1px solid var(--border);
      font-size: 13px; font-weight: 500;
      text-decoration: none; cursor: pointer;
      transition: border-color 0.15s, color 0.15s, transform 0.15s;
    }
    .btn-back:hover { border-color: var(--text3); color: var(--text); transform: translateY(-1px); }

    /* ── Brand ── */
    .brand {
      position: fixed; top: 20px; left: 24px; z-index: 10;
      font-weight: 800; font-size: 18px; letter-spacing: -0.5px;
      color: var(--text); text-decoration: none;
    }
    .brand-cursor { color: var(--green); animation: blink 1.1s step-end infinite; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .terminal { font-size: 12px; padding: 14px 16px; }
      .tagline  { font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow"></div>

<a href="/" class="brand">avalant<span class="brand-cursor">_</span></a>

<div class="content">
  <div class="num">404</div>

  <div class="terminal">
    <div class="terminal-bar">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
    </div>
    <div class="t-line"><span class="prompt">❯</span> <span class="cmd">GET</span> <span id="req-path">/unknown</span></div>
    <div class="t-line"><span class="err">✗ 404 Not Found</span></div>
    <div class="t-line"><span class="ok">→</span> This page doesn't exist</div>
    <div class="t-line"><span class="prompt">❯</span> <span class="cursor"></span></div>
  </div>

  <p class="tagline">Looks like this address isn't tracked.<br>Head back and check your portfolio.</p>

  <div class="cta-row">
    <a href="/" class="btn-home">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1.5 6L6.5 1.5L11.5 6V11.5H8.5V8H4.5V11.5H1.5V6Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
      Home
    </a>
    <button class="btn-back" onclick="history.length>1?history.back():location.href='/'">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M8 2L3 6.5L8 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Go back
    </button>
  </div>
</div>

<script>
  // Show the actual path that was requested
  document.getElementById('req-path').textContent = window.location.pathname;
</script>
</body>
</html>
