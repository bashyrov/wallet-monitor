<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="48x48" href="/avalant_favicon-48.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/avalant_favicon-96.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/avalant_favicon-192.png">
  <link rel="icon" type="image/svg+xml" href="/avalant_favicon.svg">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="192x192" href="/avalant_favicon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screener · Avalant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0E0E11;
  --surface:  #131217;
  --surface2: #17171C;
  --surface3: #202028;
  --border:   #22222A;
  --text:     #E6E8E3;
  --text2:    #9B9FAB;
  --text3:    #676B7E;
  --green:    #1AFFAB;
  --red:      #F87171;
  --yellow:   #E5C07B;
  --teal:     #06B6D4;
  --purple:   #925BD6;
  --mono:     'JetBrains Mono', monospace;
  --font:     'Inter', system-ui, -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  min-height: 100vh;
}

/* ── TOPBAR ── */
.topbar {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 24px; height: 52px;
  background: rgba(14,14,17,0.88);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.topbar::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(26,255,171,0.15), transparent);
  pointer-events: none;
}
.brand {
  display: flex; align-items: center;
  font-size: 18px; font-weight: 800; letter-spacing: -0.7px; line-height: 1;
  color: var(--text); text-decoration: none; user-select: none; flex-shrink: 0;
  font-family: var(--font);
}
.brand:hover { opacity: 0.85; }
.brand-cursor {
  color: var(--green);
  animation: blink 1.1s step-start infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.topbar-nav {
  display: flex; align-items: center; gap: 2px;
  justify-content: center;
}
.topbar-right {
  display: flex; align-items: center; gap: 8px;
  justify-content: flex-end;
}
.nav-lnk {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px; border-radius: 8px;
  font-size: 13px; font-weight: 500; color: var(--text3);
  text-decoration: none; white-space: nowrap;
  transition: color 0.15s, background 0.15s, border-color 0.15s;
  border: 1px solid transparent;
}
.nav-lnk svg { opacity: 0.6; transition: opacity 0.15s; flex-shrink: 0; }
.nav-lnk:hover { color: var(--green); background: rgba(26,255,171,0.08); border-color: rgba(26,255,171,0.12); }
.nav-lnk:hover svg { opacity: 1; }
.nav-lnk.active { color: var(--green); background: rgba(26,255,171,0.1); border-color: rgba(26,255,171,0.18); }
.nav-lnk.active svg { opacity: 1; }
.avatar-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--green), #06B6D4);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #09090B;
  text-decoration: none; cursor: pointer; flex-shrink: 0;
  transition: box-shadow 0.2s;
}
.avatar-btn:hover { box-shadow: 0 0 10px rgba(26,255,171,0.35); }
@media (max-width: 700px) {
  .topbar { grid-template-columns: auto 1fr; padding: 0 14px; }
  .topbar-nav { display: none; }
  .topbar-right { gap: 6px; }
}

/* ── MODE TABS ── */
.mode-tabs {
  display: flex; gap: 4px;
  padding: 16px 20px 0;
  max-width: 1400px; margin: 0 auto;
}
.mode-tab {
  padding: 7px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  font-size: 13px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: all .15s;
}
.mode-tab:hover { color: var(--text2); border-color: var(--border); }
.mode-tab.active {
  background: var(--surface2);
  border-color: var(--green);
  color: var(--green);
}

/* ── TOOLBAR ── */
.toolbar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 20px; max-width: 1400px; margin: 0 auto; flex-wrap: wrap;
}

/* Search */
.search-wrap { position: relative; min-width: 140px; max-width: 220px; flex: 1; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
#search {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-family: inherit; font-size: 13px;
  padding: 7px 10px 7px 32px; outline: none; transition: border-color .2s;
}
#search:focus { border-color: var(--green); }
#search::placeholder { color: var(--text3); }

/* ── EXCHANGE DROPDOWN ── */
.ex-drop-wrap { position: relative; }
.ex-drop-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text2);
  font-size: 13px; font-weight: 500; font-family: inherit;
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.ex-drop-btn:hover, .ex-drop-btn.open { border-color: var(--green); color: var(--text); }
.ex-drop-btn svg { transition: transform .15s; flex-shrink: 0; }
.ex-drop-btn.open svg { transform: rotate(180deg); }
.ex-drop-dots { display: flex; gap: 3px; }
.ex-dot { width: 8px; height: 8px; border-radius: 50%; }

.ex-drop-menu {
  position: absolute; top: calc(100% + 6px); left: 0; z-index: 200;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; min-width: 200px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  display: none; overflow: hidden;
}
.ex-drop-menu.open { display: block; }
.ex-drop-actions {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border);
}
.ex-drop-action {
  flex: 1; padding: 8px 12px; text-align: center;
  font-size: 12px; font-weight: 600; color: var(--text3);
  cursor: pointer; transition: color .15s;
  background: none; border: none; font-family: inherit;
}
.ex-drop-action:hover { color: var(--green); }
.ex-drop-action:first-child { border-right: 1px solid var(--border); }
.ex-drop-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 14px; cursor: pointer;
  transition: background .12s;
}
.ex-drop-item:hover { background: var(--surface2); }
.ex-drop-item input[type="checkbox"] { display: none; }
.ex-drop-check {
  width: 16px; height: 16px; border-radius: 4px;
  border: 1.5px solid var(--border); background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .12s;
}
.ex-drop-item.checked .ex-drop-check {
  background: var(--green); border-color: var(--green);
}
.ex-drop-item.checked .ex-drop-check::after {
  content: '✓'; font-size: 10px; color: #000; font-weight: 700; line-height: 1;
}
.ex-drop-label { font-size: 13px; font-weight: 500; }

/* ── FILTERS ── */
.filters { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.filter-input {
  width: 110px; padding: 7px 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px; font-family: var(--mono);
  outline: none; transition: border-color .2s;
}
.filter-input:focus { border-color: var(--green); }
.filter-input::placeholder { color: var(--text3); font-family: inherit; }
.filter-label { font-size: 12px; color: var(--text3); white-space: nowrap; }
.filter-toggle {
  display: flex; align-items: center; gap: 6px; cursor: pointer;
  padding: 7px 10px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text3); font-size: 12px; font-weight: 500;
  user-select: none; transition: all .15s;
}
.filter-toggle.active { border-color: var(--green); color: var(--green); background: rgba(26,255,171,.06); }
.filter-toggle input { display: none; }

/* ── REFRESH / STATUS ── */
.toolbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.refresh-info { font-size: 11px; color: var(--text3); font-family: var(--mono); white-space: nowrap; display: flex; align-items: center; gap: 6px; }
.ws-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text3); flex-shrink: 0;
  transition: background .3s;
}
.ws-dot.live { background: var(--green); animation: ws-pulse 2s ease-in-out infinite; }
.ws-dot.error { background: var(--red); }
@keyframes ws-pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.btn-refresh {
  padding: 7px 12px; background: transparent;
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text2); font-size: 12px; cursor: pointer; transition: all .15s;
}
.btn-refresh:hover { border-color: var(--green); color: var(--green); }

/* ── STATS ── */
.stats-bar {
  display: flex; gap: 20px; padding: 0 20px 12px;
  max-width: 1400px; margin: 0 auto; flex-wrap: wrap;
}
.stat-item { font-size: 12px; color: var(--text3); }
.stat-item b { color: var(--text2); font-family: var(--mono); }

/* ── TABLE ── */
.table-wrap { max-width: 1400px; margin: 0 auto; padding: 0 20px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
#tbl-funding { min-width: 680px; }
#tbl-arb     { min-width: 960px; }
thead th {
  text-align: left; padding: 8px 12px;
  font-size: 11px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .5px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none; white-space: nowrap;
}
thead th:hover { color: var(--text2); }
thead th .sort-arrow { margin-left: 4px; opacity: .4; }
thead th.sorted .sort-arrow { opacity: 1; color: var(--green); }
tbody tr { border-bottom: 1px solid rgba(34,34,42,.6); transition: background .12s; }
tbody tr:hover { background: var(--surface); }
tbody td { padding: 10px 12px; font-size: 13px; white-space: nowrap; }

/* symbol */
.td-symbol { font-weight: 700; font-family: var(--mono); }

/* exchange badge */
.ex-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px; border-radius: 5px;
  font-size: 10px; font-weight: 700; letter-spacing: .3px;
}
.ex-binance     { background: rgba(240,185,11,.15);  color: #F0B90B; }
.ex-bybit       { background: rgba(247,166,0,.15);   color: #F7A600; }
.ex-okx         { background: rgba(224,224,224,.1);  color: #E0E0E0; }
.ex-gate        { background: rgba(228,12,91,.15);   color: #E40C5B; }
.ex-kucoin      { background: rgba(0,188,140,.15);   color: #00BC8C; }
.ex-mexc        { background: rgba(0,192,154,.15);   color: #00C09A; }
.ex-bitget      { background: rgba(0,180,216,.15);   color: #00B4D8; }
.ex-hyperliquid { background: rgba(72,205,216,.15);  color: #48CDD8; }
.ex-aster       { background: rgba(255,140,0,.15);   color: #FF8C00; }
.ex-ethereal    { background: rgba(147,112,219,.15); color: #9370DB; }

.td-price { font-family: var(--mono); color: var(--text2); }
.td-rate  { font-family: var(--mono); font-weight: 600; }
.rate-pos  { color: var(--red); }
.rate-neg  { color: var(--green); }
.rate-zero { color: var(--text3); }
.td-apr { font-family: var(--mono); font-weight: 700; }
.td-next { font-family: var(--mono); color: var(--text3); font-size: 12px; }
.next-soon { color: var(--yellow); }

/* arbitrage specific */
.arb-pair { display: flex; flex-direction: column; gap: 3px; }
.arb-ex-rate { display: flex; align-items: center; gap: 6px; }
.arb-label { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; min-width: 32px; }
.td-gross { font-family: var(--mono); font-weight: 700; color: var(--green); }
.td-spread { font-family: var(--mono); font-size: 12px; }
.td-fees { font-family: var(--mono); font-size: 12px; color: var(--text3); }
.td-net { font-family: var(--mono); font-weight: 700; font-size: 14px; }
.net-pos { color: var(--green); }
.net-neg { color: var(--red); }
.td-status { font-size: 11px; }
.badge-valid { background: rgba(26,255,171,.1); color: var(--green); padding: 2px 7px; border-radius: 99px; font-weight: 600; font-size: 10px; }
.badge-invalid { background: rgba(248,113,113,.1); color: var(--red); padding: 2px 7px; border-radius: 99px; font-weight: 600; font-size: 10px; }

.empty-msg { text-align: center; padding: 60px 20px; color: var(--text3); }
.spinner {
  display: inline-block; width: 18px; height: 18px;
  border: 2px solid var(--border); border-top-color: var(--green);
  border-radius: 50%; animation: spin .7s linear infinite;
  margin-right: 8px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── MOBILE SORT BAR ── */
.mobile-sort {
  display: none;
  padding: 0 12px 10px;
  max-width: 1400px; margin: 0 auto;
}
.mobile-sort-label { font-size: 11px; color: var(--text3); font-weight: 500; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .4px; }
.mobile-sort-chips {
  display: flex; gap: 6px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: 2px;
  scrollbar-width: none;
}
.mobile-sort-chips::-webkit-scrollbar { display: none; }
.sort-chip {
  flex-shrink: 0;
  padding: 5px 11px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text3);
  font-size: 12px; font-weight: 500; font-family: inherit;
  cursor: pointer; transition: all .15s;
  white-space: nowrap;
  display: flex; align-items: center; gap: 5px;
}
.sort-chip:hover { border-color: var(--green); color: var(--text2); }
.sort-chip.active { background: rgba(26,255,171,.08); border-color: var(--green); color: var(--green); }
.sort-chip .sc-arr { font-size: 10px; }

/* ── PAGER ── */
.pager {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  padding: 12px 20px 6px;
  max-width: 1400px; margin: 0 auto;
}
.pager-btn {
  padding: 5px 14px; border-radius: 7px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text2); font-size: 13px; font-weight: 500; font-family: inherit;
  cursor: pointer; transition: all .15s;
}
.pager-btn:hover:not(:disabled) { border-color: var(--green); color: var(--green); }
.pager-btn:disabled { opacity: 0.3; cursor: default; }
.pager-info {
  font-size: 13px; font-family: var(--mono); color: var(--text3);
  min-width: 64px; text-align: center;
}

@media (max-width: 700px) {
  .mobile-sort { display: block; }
}

/* ── MOBILE CARDS ── */
.cards-wrap {
  display: none; padding: 0 12px 8px;
  max-width: 1400px; margin: 0 auto;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color .15s;
}
.card:active { border-color: var(--border); opacity: .9; }
.card.open   { border-color: rgba(26,255,171,.3); }
.card-head {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 14px;
}
.card-symbol { font-weight: 700; font-family: var(--mono); font-size: 14px; min-width: 56px; }
.card-badges { display: flex; gap: 5px; flex-wrap: wrap; flex: 1; align-items: center; }
.card-right  { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
.card-apr    { font-family: var(--mono); font-weight: 700; font-size: 14px; }
.card-next   { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.card-chevron { color: var(--text3); font-size: 12px; transition: transform .2s; margin-left: 4px; flex-shrink: 0; }
.card.open .card-chevron { transform: rotate(180deg); }
.card-body {
  display: none;
  padding: 0 14px 14px;
  border-top: 1px solid var(--border);
  margin-top: 0;
}
.card.open .card-body { display: block; }
.card-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid rgba(34,34,42,.6);
}
.card-row:last-child { border-bottom: none; }
.card-lbl { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
.card-val { font-family: var(--mono); font-size: 13px; }

/* arb card specifics */
.card-net { font-family: var(--mono); font-weight: 700; font-size: 14px; }
.card-exrow { display: flex; flex-direction: column; gap: 2px; align-items: flex-end; }
.card-exrow-item { display: flex; align-items: center; gap: 5px; }

@media (max-width: 700px) {
  .table-wrap  { display: none !important; }
  .cards-wrap  { display: block; }
  .toolbar     { gap: 8px; }
  .search-wrap { max-width: 100%; }
  .toolbar-right { width: 100%; justify-content: space-between; }
  .filters { width: 100%; }
  .stats-bar { padding: 0 12px 10px; }
  .mode-tabs { padding: 12px 12px 0; }
}
</style>
</head>
<body>

<header class="topbar">
  <a href="/" class="brand">
    avalant<span class="brand-cursor">_</span>
  </a>
  <nav class="topbar-nav">
    <a href="/app" class="nav-lnk">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="6" width="3" height="5" rx="0.7" fill="currentColor" opacity=".5"/><rect x="4.5" y="3.5" width="3" height="7.5" rx="0.7" fill="currentColor" opacity=".75"/><rect x="8" y="1" width="3" height="10" rx="0.7" fill="currentColor"/></svg>

    </a>
    <a href="/screener" class="nav-lnk active">

      Screener
    </a>
    <a href="/archive" class="nav-lnk">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="4" width="10" height="7" rx="1" stroke="currentColor" stroke-width="1.35"/><path d="M1 4l1.5-2.5h7L11 4" stroke="currentColor" stroke-width="1.35" stroke-linejoin="round"/><path d="M4.5 6.5h3" stroke="currentColor" stroke-width="1.35" stroke-linecap="round"/></svg>
      Archive
    </a>
    <a href="/pricing" class="nav-lnk">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1.5 1.5h3.8l5 5-3.8 3.8-5-5V1.5z" stroke="currentColor" stroke-width="1.35" stroke-linejoin="round"/><circle cx="4" cy="4" r="0.9" fill="currentColor"/></svg>

  </nav>
  <div class="topbar-right">
    <a href="/profile" class="avatar-btn" id="nav-avatar" title="Profile">U</a>
  </div>
</header>

<!-- ── MODE TABS ── -->
<div class="mode-tabs">
  <button class="mode-tab active" id="tab-funding" onclick="switchMode('funding')">Funding Rates</button>
  <button class="mode-tab" id="tab-arb" onclick="switchMode('arb')">Arbitrage</button>
</div>

<!-- ── TOOLBAR ── -->
<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.8"/><path d="M15 15l3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    <input id="search" type="text" placeholder="Search token…" autocomplete="off">
  </div>

  <!-- Exchange dropdown -->
  <div class="ex-drop-wrap" id="ex-drop-wrap">
    <button class="ex-drop-btn" id="ex-drop-btn" onclick="toggleExDrop(event)">
      <div class="ex-drop-dots" id="ex-drop-dots"></div>
      <span id="ex-drop-label">All exchanges</span>
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="ex-drop-menu" id="ex-drop-menu">
      <div class="ex-drop-actions">
        <button class="ex-drop-action" onclick="exSelectAll()">All</button>
        <button class="ex-drop-action" onclick="exSelectNone()">None</button>
      </div>
      <div id="ex-drop-items"></div>
    </div>
  </div>

  <!-- Funding filters -->
  <div class="filters" id="filters-funding">
    <label class="filter-toggle active" id="f-cross-toggle" onclick="toggleCrossOnly()">
      <span id="f-cross-icon">●</span> Multi-exchange
    </label>

<script src="/auth.js"></script>
<script>
Auth.requireAuth('/login');

// ── constants ──────────────────────────────────────────────────────────────────
const EXCHANGES = ['binance','bybit','okx','gate','kucoin','mexc','bitget','hyperliquid','aster','ethereal'];
const EX_LABEL  = { binance:'Binance', bybit:'Bybit', okx:'OKX', gate:'Gate.io', kucoin:'KuCoin', mexc:'MEXC', bitget:'Bitget', hyperliquid:'Hyperliquid', aster:'Aster', ethereal:'Ethereal' };
const EX_COLOR  = { binance:'#F0B90B', bybit:'#F7A600', okx:'#E0E0E0', gate:'#E40C5B', kucoin:'#00BC8C', mexc:'#00C09A', bitget:'#00B4D8', hyperliquid:'#48CDD8', aster:'#FF8C00', ethereal:'#9370DB' };

// ── state ──────────────────────────────────────────────────────────────────────
let _mode = 'funding';
let _rows = [];           // funding rows
let _arbRows = [];        // arbitrage opportunities
let _filtered = [];
let _filteredArb = [];
let _exDisabled = new Set();   // exchanges to hide (empty = show all)
let _sortF = { col: 'apr', asc: false };
let _sortA = { col: 'net_profit', asc: false };
let _validOnly = false;
let _crossOnly = true;   // show only tokens on 2+ exchanges by default

// ── pagination ────────────────────────────────────────────────────────────────
const PAGE_SIZE = 15;
let _pageF = 0;
let _pageA = 0;

// ── WebSocket state ────────────────────────────────────────────────────────────
let _ws    = null;  // funding WebSocket
let _wsArb = null;  // arbitrage WebSocket

// ── init nav ───────────────────────────────────────────────────────────────────
(function initNav() {
  const u = Auth.getUser();
  if (u) {
    const el = document.getElementById('nav-avatar');
    if (el) el.textContent = (u.username || u.email || 'U')[0].toUpperCase();
  }
})();

// ── exchange dropdown ──────────────────────────────────────────────────────────
function buildExDrop() {
  const items = document.getElementById('ex-drop-items');
  items.innerHTML = EXCHANGES.map(ex => `
    <div class="ex-drop-item checked" id="ex-item-${ex}" onclick="toggleEx('${ex}')">
      <div class="ex-drop-check" id="ex-check-${ex}"></div>
      <span class="ex-drop-label">
        <span class="ex-badge ex-${ex}">${EX_LABEL[ex]}</span>
      </span>
    </div>
  `).join('');
  updateExDropBtn();
}

function updateExDropBtn() {
  const active = EXCHANGES.filter(ex => !_exDisabled.has(ex));
  const dotsEl = document.getElementById('ex-drop-dots');
  const labelEl = document.getElementById('ex-drop-label');
  dotsEl.innerHTML = active.slice(0, 6).map(ex =>
    `<div class="ex-dot" style="background:${EX_COLOR[ex]}"></div>`
  ).join('');
  if (_exDisabled.size === 0) {
    labelEl.textContent = 'All exchanges';
  } else if (active.length === 0) {
    labelEl.textContent = 'No exchanges';
  } else {
    labelEl.textContent = `${active.length} / ${EXCHANGES.length}`;
  }
}

function toggleExDrop(e) {
  e.stopPropagation();
  const btn  = document.getElementById('ex-drop-btn');
  const menu = document.getElementById('ex-drop-menu');
  const open = menu.classList.toggle('open');
  btn.classList.toggle('open', open);
}

function closeExDrop() {
  document.getElementById('ex-drop-menu').classList.remove('open');
  document.getElementById('ex-drop-btn').classList.remove('open');
}

document.addEventListener('click', e => {
  if (!document.getElementById('ex-drop-wrap').contains(e.target)) closeExDrop();
});

function toggleEx(ex) {
  const item  = document.getElementById(`ex-item-${ex}`);
  if (_exDisabled.has(ex)) {
    _exDisabled.delete(ex);
    item.classList.add('checked');
  } else {
    _exDisabled.add(ex);
    item.classList.remove('checked');
  }
  updateExDropBtn();
  _mode === 'funding' ? applyFilter() : applyArb();
}

function exSelectAll() {
  _exDisabled.clear();
  EXCHANGES.forEach(ex => document.getElementById(`ex-item-${ex}`).classList.add('checked'));
  updateExDropBtn();
  _mode === 'funding' ? applyFilter() : applyArb();
}

function exSelectNone() {
  EXCHANGES.forEach(ex => {
    _exDisabled.add(ex);
    document.getElementById(`ex-item-${ex}`).classList.remove('checked');
  });
  updateExDropBtn();
  _mode === 'funding' ? applyFilter() : applyArb();
}

// ── mode switch ────────────────────────────────────────────────────────────────
function switchMode(mode) {
  _mode = mode;
  document.getElementById('tab-funding').classList.toggle('active', mode === 'funding');
  document.getElementById('tab-arb').classList.toggle('active', mode === 'arb');
  document.getElementById('section-funding').style.display     = mode === 'funding' ? '' : 'none';
  document.getElementById('section-arb').style.display         = mode === 'arb'     ? '' : 'none';
  document.getElementById('filters-funding').style.display     = mode === 'funding' ? '' : 'none';
  document.getElementById('filters-arb').style.display         = mode === 'arb'     ? '' : 'none';
  document.getElementById('mobile-sort-funding').style.display = mode === 'funding' ? '' : 'none';
  document.getElementById('mobile-sort-arb').style.display     = mode === 'arb'     ? '' : 'none';
  if (mode === 'arb' && !_arbRows.length) loadArb();
  else if (mode === 'funding') applyFilter();
  else applyArb();
}

function toggleValidOnly() {
  _validOnly = !_validOnly;
  const tog = document.getElementById('f-valid-toggle');
  const ico = document.getElementById('f-valid-icon');
  tog.classList.toggle('active', _validOnly);
  ico.textContent = _validOnly ? '●' : '○';
  applyArb();
}

function toggleCrossOnly() {
  _crossOnly = !_crossOnly;
  const tog = document.getElementById('f-cross-toggle');
  const ico = document.getElementById('f-cross-icon');
  tog.classList.toggle('active', _crossOnly);
  ico.textContent = _crossOnly ? '●' : '○';
  applyFilter();
}

// ── WebSocket helpers ──────────────────────────────────────────────────────────
function _wsUrl(path) {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  return `${proto}://${location.host}/api/screener/ws/${path}?token=${Auth.getToken()}`;
}

function setWsStatus(state) {
  const dot = document.getElementById('ws-dot');
  const lbl = document.getElementById('ws-status');
  const states = {
    live:         ['ws-dot live',  'Live'],
    connecting:   ['ws-dot',       'Connecting…'],
    reconnecting: ['ws-dot error', 'Reconnecting…'],
    error:        ['ws-dot error', 'Disconnected'],
  };
  const [cls, text] = states[state] || states.error;
  dot.className = cls;
  lbl.textContent = text;
}

function _makeWs({ path, onMessage, retryRef, pingRef, retryTimerRef, onOpen }) {
  const state = { retry: retryRef.val, ping: null, retryTimer: null };

  function connect() {
    const ws = new WebSocket(_wsUrl(path));

    ws.onopen = () => {
      retryRef.val = 0;
      clearInterval(pingRef.val);
      pingRef.val = setInterval(() => {
        if (ws.readyState === WebSocket.OPEN) ws.send('ping');
      }, 20000);
      if (onOpen) onOpen();
    };

    ws.onmessage = (ev) => {
      if (ev.data === 'pong') return;
      try { onMessage(JSON.parse(ev.data)); } catch (_) {}
    };

    ws.onclose = (ev) => {
      clearInterval(pingRef.val);
      if (ev.code === 4001) { Auth.requireAuth('/login'); return; }
      const delay = Math.min(2000 * Math.pow(2, retryRef.val), 30000);
      retryRef.val++;
      clearTimeout(retryTimerRef.val);
      retryTimerRef.val = setTimeout(connect, delay);
    };

    ws.onerror = () => ws.close();
    return ws;
  }

  return connect;
}

// ── Funding WebSocket ──────────────────────────────────────────────────────────
const _retryF      = { val: 0 };
const _pingF       = { val: null };
const _retryTimerF = { val: null };

const _connectFunding = _makeWs({
  path: 'funding',
  retryRef: _retryF, pingRef: _pingF, retryTimerRef: _retryTimerF,
  onOpen: () => setWsStatus('live'),
  onMessage: (data) => {
    _rows = data.rows || [];
    renderStats(data);
    applyFilter(true);  // keepPage — не сбрасывать страницу при обновлении данных
  },
});

function connectWs() {
  _ws = _connectFunding();
  setWsStatus('connecting');
}

function reconnectWs() {
  clearTimeout(_retryTimerF.val);
  if (_ws) { _ws.onclose = null; _ws.close(); _ws = null; }
  _retryF.val = 0;
  connectWs();
}

// ── Arbitrage WebSocket ────────────────────────────────────────────────────────
const _retryA      = { val: 0 };
const _pingA       = { val: null };
const _retryTimerA = { val: null };

const _connectArb = _makeWs({
  path: 'arb',
  retryRef: _retryA, pingRef: _pingA, retryTimerRef: _retryTimerA,
  onMessage: (data) => {
    _arbRows = data.opportunities || [];
    applyArb(true);  // keepPage — не сбрасывать страницу при обновлении данных
  },
});

function loadArb() {
  // Show loading state first time
  if (!_arbRows.length) {
    document.getElementById('tbody-arb').innerHTML =
      '<tr><td colspan="9" class="empty-msg"><span class="spinner"></span>Computing arbitrage…</td></tr>';
    document.getElementById('cards-arb').innerHTML =
      '<div class="empty-msg"><span class="spinner"></span>Computing…</div>';
  }
  if (!_wsArb || _wsArb.readyState === WebSocket.CLOSED) {
    _wsArb = _connectArb();
  }
}

// ── funding filter + sort ──────────────────────────────────────────────────────
function applyFilter(keepPage = false) {
  const q = document.getElementById('search').value.trim().toUpperCase();
  const minApr = parseFloat(document.getElementById('f-min-apr').value) || 0;
  _filtered = _rows.filter(r => {
    if (_exDisabled.has(r.exchange)) return false;
    if (q && !r.symbol.includes(q)) return false;
    if (minApr > 0 && Math.abs(r.apr) < minApr) return false;
    if (_crossOnly && !r.cross_listed) return false;
    return true;
  });
  if (!keepPage) _pageF = 0;
  sortFRows(keepPage);
}

function sortBy(col) {
  if (_sortF.col === col) _sortF.asc = !_sortF.asc;
  else { _sortF.col = col; _sortF.asc = col === 'symbol' || col === 'exchange'; }
  document.querySelectorAll('#tbl-funding thead th').forEach(th => {
    const c = th.dataset.col;
    th.classList.toggle('sorted', c === _sortF.col);
    const a = th.querySelector('.sort-arrow');
    if (a) a.textContent = c === _sortF.col ? (_sortF.asc ? '↑' : '↓') : '↕';
  });
  sortFRows();
}

function sortFRows(keepPage = false) {
  const col = _sortF.col;
  _filtered.sort((a, b) => {
    let va = a[col], vb = b[col];
    if (col === 'symbol' || col === 'exchange') {
      va = String(va); vb = String(vb);
      return _sortF.asc ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    if (col === 'apr') { va = Math.abs(va); vb = Math.abs(vb); }
    return _sortF.asc ? va - vb : vb - va;
  });
  if (!keepPage) _pageF = 0;
  renderFunding();
}

// ── arbitrage filter + sort ────────────────────────────────────────────────────
function applyArb(keepPage = false) {
  const q = document.getElementById('search').value.trim().toUpperCase();
  const minNet   = parseFloat(document.getElementById('f-min-net').value)   || -Infinity;
  const minGross = parseFloat(document.getElementById('f-min-gross').value) || 0;

  _filteredArb = _arbRows.filter(r => {
    if (_exDisabled.has(r.long_exchange) || _exDisabled.has(r.short_exchange)) return false;
    if (q && !r.symbol.includes(q)) return false;
    if (r.net_profit < minNet)   return false;
    if (r.gross_funding < minGross) return false;
    if (_validOnly && !r.valid_price) return false;
    return true;
  });
  if (!keepPage) _pageA = 0;
  sortARows(keepPage);
}

function sortArb(col) {
  if (_sortA.col === col) _sortA.asc = !_sortA.asc;
  else { _sortA.col = col; _sortA.asc = col === 'symbol' || col === 'long_exchange' || col === 'short_exchange'; }
  document.querySelectorAll('#tbl-arb thead th').forEach(th => {
    const c = th.dataset.acol;
    if (!c) return;
    th.classList.toggle('sorted', c === _sortA.col);
    const a = th.querySelector('.sort-arrow');
    if (a) a.textContent = c === _sortA.col ? (_sortA.asc ? '↑' : '↓') : '↕';
  });
  sortARows();
}

function sortARows(keepPage = false) {
  const col = _sortA.col;
  _filteredArb.sort((a, b) => {
    let va = a[col], vb = b[col];
    if (typeof va === 'string') return _sortA.asc ? va.localeCompare(vb) : vb.localeCompare(va);
    return _sortA.asc ? va - vb : vb - va;
  });
  if (!keepPage) _pageA = 0;
  renderArb();
}

// ── render stats ───────────────────────────────────────────────────────────────
function renderStats(data) {
  const total = (data.rows || []).length;
  const exCount = new Set((data.rows || []).map(r => r.exchange)).size;
  const ts = data.ts ? new Date(data.ts * 1000).toLocaleTimeString() : '—';
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-item"><b>${total}</b> contracts tracked</div>
    <div class="stat-item"><b>${exCount}</b> exchanges</div>
    <div class="stat-item">Updated at <b>${ts}</b></div>
  `;
}

// ── format helpers ─────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtPrice(p) {
  if (!p) return '—';
  if (p >= 1000) return '$' + p.toLocaleString('en-US', {maximumFractionDigits: 2});
  if (p >= 1)    return '$' + p.toFixed(4);
  return '$' + p.toPrecision(4);
}

function fmtRate(rate, interval_h) {
  const pct = (rate * 100).toFixed(4);
  const sign = rate >= 0 ? '+' : '';
  const cls  = rate > 0 ? 'rate-pos' : rate < 0 ? 'rate-neg' : 'rate-zero';
  const lbl  = interval_h === 1 ? '1h' : `${interval_h}h`;
  return `<span class="td-rate ${cls}">${sign}${pct}%<span style="font-weight:400;color:var(--text3);font-size:11px"> /${lbl}</span></span>`;
}

function fmtApr(apr) {
  if (apr == null) return '—';
  const sign = apr >= 0 ? '+' : '';
  const cls  = apr > 0 ? 'rate-pos' : apr < 0 ? 'rate-neg' : 'rate-zero';
  return `<span class="td-apr ${cls}">${sign}${Math.abs(apr).toFixed(2)}%</span>`;
}

function fmtCountdown(ts) {
  if (!ts) return '—';
  const diff = ts - Math.floor(Date.now() / 1000);
  if (diff <= 0) return '<span class="next-soon">now</span>';
  const h = Math.floor(diff / 3600), m = Math.floor((diff % 3600) / 60), s = diff % 60;
  const cls = diff < 600 ? 'next-soon' : '';
  if (h > 0) return `<span class="${cls}">${h}h ${m}m</span>`;
  if (m > 0) return `<span class="${cls}">${m}m ${s}s</span>`;
  return `<span class="next-soon">${s}s</span>`;
}

function fmtVol(v) {
  if (!v || v === 0) return '<span style="color:var(--text3)">—</span>';
  if (v >= 1e9) return '$' + (v / 1e9).toFixed(2) + 'B';
  if (v >= 1e6) return '$' + (v / 1e6).toFixed(2) + 'M';
  if (v >= 1e3) return '$' + (v / 1e3).toFixed(1) + 'K';
  return '$' + v.toFixed(0);
}

function fmtPct(v, decimals = 4) {
  if (v == null) return '—';
  const sign = v >= 0 ? '+' : '';
  return `${sign}${v.toFixed(decimals)}%`;
}

function fmtExRate(ex, rate_pct) {
  const sign = rate_pct >= 0 ? '+' : '';
  const cls  = rate_pct > 0 ? 'rate-pos' : rate_pct < 0 ? 'rate-neg' : 'rate-zero';
  return `<span class="ex-badge ex-${ex}">${EX_LABEL[ex]||ex}</span>
          <span class="td-rate ${cls}" style="font-size:12px">${sign}${rate_pct.toFixed(4)}%</span>`;
}

// ── pager helper ───────────────────────────────────────────────────────────────
function renderPager(id, page, total, goFn) {
  const el = document.getElementById(id);
  if (!el) return;
  const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (pages <= 1) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <button class="pager-btn" onclick="${goFn}(${page - 1})" ${page === 0 ? 'disabled' : ''}>← Prev</button>
    <span class="pager-info">${page + 1} / ${pages}</span>
    <button class="pager-btn" onclick="${goFn}(${page + 1})" ${page >= pages - 1 ? 'disabled' : ''}>Next →</button>`;
}

function goPageF(n) {
  const pages = Math.ceil(_filtered.length / PAGE_SIZE);
  _pageF = Math.max(0, Math.min(n, pages - 1));
  renderFunding();
}
function goPageA(n) {
  const pages = Math.ceil(_filteredArb.length / PAGE_SIZE);
  _pageA = Math.max(0, Math.min(n, pages - 1));
  renderArb();
}

// ── render funding ─────────────────────────────────────────────────────────────
function renderFunding() {
  const tbody = document.getElementById('tbody-funding');
  const start = _pageF * PAGE_SIZE;
  const page  = _filtered.slice(start, start + PAGE_SIZE);
  if (!_filtered.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">No contracts match your filter</td></tr>';
  } else {
    tbody.innerHTML = page.map(r => `
      <tr>
        <td class="td-symbol">${esc(r.symbol)}</td>
        <td><span class="ex-badge ex-${r.exchange}">${EX_LABEL[r.exchange]||r.exchange}</span></td>
        <td class="td-price">${fmtPrice(r.price)}</td>
        <td>${fmtRate(r.rate, r.interval_h)}</td>
        <td>${fmtApr(r.apr)}</td>
        <td class="td-vol" style="font-family:var(--mono);font-size:12px;color:var(--text2)">${fmtVol(r.volume_usd)}</td>
        <td class="td-next">${fmtCountdown(r.next_ts)}</td>
      </tr>
    `).join('');
  }
  renderPager('pager-funding', _pageF, _filtered.length, 'goPageF');
  renderFundingCards();
}

// ── render arbitrage ───────────────────────────────────────────────────────────
function renderArb() {
  const tbody = document.getElementById('tbody-arb');
  const start = _pageA * PAGE_SIZE;
  const page  = _filteredArb.slice(start, start + PAGE_SIZE);
  if (!_filteredArb.length) {
    const msg = _arbRows.length ? 'No opportunities match your filter' : 'No data yet';
    tbody.innerHTML = `<tr><td colspan="9" class="empty-msg">${msg}</td></tr>`;
    renderPager('pager-arb', _pageA, _filteredArb.length, 'goPageA');
    renderArbCards();
    return;
  }
  tbody.innerHTML = page.map(r => {
    const netCls = r.net_profit > 0 ? 'net-pos' : 'net-neg';
    const netSign = r.net_profit >= 0 ? '+' : '';
    const grossSign = r.gross_funding >= 0 ? '+' : '';
    const spreadSign = r.price_spread >= 0 ? '+' : '';
    const spreadCls = r.price_spread >= 0 ? 'rate-neg' : 'rate-pos';
    const validBadge = r.valid_price
      ? '<span class="badge-valid">✓ valid</span>'
      : '<span class="badge-invalid">⚠ spread</span>';

    return `<tr>
      <td class="td-symbol">${esc(r.symbol)}</td>
      <td>
        <div class="arb-pair">
          <div class="arb-ex-rate">
            <span class="arb-label">long</span>
            ${fmtExRate(r.long_exchange, r.long_rate)}
          </div>
          <div style="font-size:11px;color:var(--text3);margin-left:36px">${fmtPrice(r.long_price)} · <span style="font-family:var(--mono)">${fmtVol(r.long_volume)}</span></div>
        </div>
      </td>
      <td>
        <div class="arb-pair">
          <div class="arb-ex-rate">
            <span class="arb-label">short</span>
            ${fmtExRate(r.short_exchange, r.short_rate)}
          </div>
          <div style="font-size:11px;color:var(--text3);margin-left:36px">${fmtPrice(r.short_price)} · <span style="font-family:var(--mono)">${fmtVol(r.short_volume)}</span></div>
        </div>
      </td>
      <td class="td-gross">${grossSign}${r.gross_funding.toFixed(4)}%<br><span style="font-size:10px;color:var(--text3);font-weight:400">per 8h</span></td>
      <td class="td-spread"><span class="${spreadCls}">${spreadSign}${r.price_spread.toFixed(4)}%</span></td>
      <td class="td-fees">
        <span title="long: ${r.fee_long}% + short: ${r.fee_short}%">−${r.total_fees.toFixed(4)}%</span>
      </td>
      <td><span class="td-net ${netCls}">${netSign}${r.net_profit.toFixed(4)}%</span></td>
      <td>${fmtApr(r.net_apr)}</td>
      <td class="td-status">${validBadge}</td>
    </tr>`;
  }).join('');
  renderPager('pager-arb', _pageA, _filteredArb.length, 'goPageA');
  renderArbCards();
}

// ── mobile sort bar ───────────────────────────────────────────────────────────
const SORT_CHIPS_F = [
  { col: 'apr',        label: 'APR' },
  { col: 'rate',       label: 'Rate' },
  { col: 'volume_usd', label: 'Volume' },
  { col: 'symbol',     label: 'Token' },
  { col: 'exchange',   label: 'Exchange' },
  { col: 'price',    label: 'Price' },
  { col: 'next_ts',  label: 'Next' },
];
const SORT_CHIPS_A = [
  { col: 'net_profit',    label: 'Net profit' },
  { col: 'net_apr',       label: 'Net APR' },
  { col: 'gross_funding', label: 'Gross' },
  { col: 'price_spread',  label: 'Spread' },
  { col: 'symbol',        label: 'Token' },
  { col: 'total_fees',    label: 'Fees' },
];

function buildSortChips() {
  const wf = document.getElementById('sort-chips-funding');
  const wa = document.getElementById('sort-chips-arb');
  wf.innerHTML = SORT_CHIPS_F.map(c => `
    <button class="sort-chip${_sortF.col === c.col ? ' active' : ''}"
            id="sc-f-${c.col}" onclick="mobileSortF('${c.col}')">
      ${c.label}<span class="sc-arr" id="sc-f-arr-${c.col}">${_sortF.col === c.col ? (_sortF.asc ? '↑' : '↓') : ''}</span>
    </button>`).join('');
  wa.innerHTML = SORT_CHIPS_A.map(c => `
    <button class="sort-chip${_sortA.col === c.col ? ' active' : ''}"
            id="sc-a-${c.col}" onclick="mobileSortA('${c.col}')">
      ${c.label}<span class="sc-arr" id="sc-a-arr-${c.col}">${_sortA.col === c.col ? (_sortA.asc ? '↑' : '↓') : ''}</span>
    </button>`).join('');
}

function mobileSortF(col) {
  if (_sortF.col === col) _sortF.asc = !_sortF.asc;
  else { _sortF.col = col; _sortF.asc = col === 'symbol' || col === 'exchange'; }
  // sync desktop headers
  document.querySelectorAll('#tbl-funding thead th').forEach(th => {
    const c = th.dataset.col;
    th.classList.toggle('sorted', c === _sortF.col);
    const a = th.querySelector('.sort-arrow');
    if (a) a.textContent = c === _sortF.col ? (_sortF.asc ? '↑' : '↓') : '↕';
  });
  // update chips
  SORT_CHIPS_F.forEach(c => {
    const chip = document.getElementById(`sc-f-${c.col}`);
    const arr  = document.getElementById(`sc-f-arr-${c.col}`);
    if (!chip) return;
    chip.classList.toggle('active', c.col === _sortF.col);
    arr.textContent = c.col === _sortF.col ? (_sortF.asc ? '↑' : '↓') : '';
  });
  sortFRows();
}

function mobileSortA(col) {
  if (_sortA.col === col) _sortA.asc = !_sortA.asc;
  else { _sortA.col = col; _sortA.asc = col === 'symbol' || col === 'long_exchange' || col === 'short_exchange'; }
  // sync desktop headers
  document.querySelectorAll('#tbl-arb thead th').forEach(th => {
    const c = th.dataset.acol;
    if (!c) return;
    th.classList.toggle('sorted', c === _sortA.col);
    const a = th.querySelector('.sort-arrow');
    if (a) a.textContent = c === _sortA.col ? (_sortA.asc ? '↑' : '↓') : '↕';
  });
  // update chips
  SORT_CHIPS_A.forEach(c => {
    const chip = document.getElementById(`sc-a-${c.col}`);
    const arr  = document.getElementById(`sc-a-arr-${c.col}`);
    if (!chip) return;
    chip.classList.toggle('active', c.col === _sortA.col);
    arr.textContent = c.col === _sortA.col ? (_sortA.asc ? '↑' : '↓') : '';
  });
  sortARows();
}

// ── mobile cards ──────────────────────────────────────────────────────────────
function toggleCard(el) {
  el.classList.toggle('open');
}

function renderFundingCards() {
  const wrap = document.getElementById('cards-funding');
  if (!_filtered.length) {
    wrap.innerHTML = '<div class="empty-msg">No contracts match your filter</div>';
    return;
  }
  const start = _pageF * PAGE_SIZE;
  const page  = _filtered.slice(start, start + PAGE_SIZE);
  wrap.innerHTML = page.map((r, i) => {
    const absI = start + i;
    const aprSign = r.apr >= 0 ? '+' : '';
    const aprCls  = r.apr > 0 ? 'rate-pos' : r.apr < 0 ? 'rate-neg' : 'rate-zero';
    const ratePct = (r.rate * 100).toFixed(4);
    const rateSign = r.rate >= 0 ? '+' : '';
    const rateCls  = r.rate > 0 ? 'rate-pos' : r.rate < 0 ? 'rate-neg' : 'rate-zero';
    const intLbl = r.interval_h === 1 ? '1h' : `${r.interval_h}h`;
    return `
    <div class="card" onclick="toggleCard(this)" data-fi="${absI}">
      <div class="card-head">
        <span class="card-symbol">${esc(r.symbol)}</span>
        <div class="card-badges">
          <span class="ex-badge ex-${r.exchange}">${EX_LABEL[r.exchange]||r.exchange}</span>
        </div>
        <div class="card-right">
          <span class="card-apr ${aprCls}">${aprSign}${Math.abs(r.apr).toFixed(2)}% APR</span>
          <span class="card-next" id="cn-f-${absI}">${fmtCountdown(r.next_ts)}</span>
        </div>
        <span class="card-chevron">▼</span>
      </div>
      <div class="card-body">
        <div class="card-row">
          <span class="card-lbl">Price</span>
          <span class="card-val">${fmtPrice(r.price)}</span>
        </div>
        <div class="card-row">
          <span class="card-lbl">Funding / ${intLbl}</span>
          <span class="card-val ${rateCls}">${rateSign}${ratePct}%</span>
        </div>
        <div class="card-row">
          <span class="card-lbl">Annual APR</span>
          <span class="card-val ${aprCls}">${aprSign}${Math.abs(r.apr).toFixed(2)}%</span>
        </div>
        <div class="card-row">
          <span class="card-lbl">Volume 24h</span>
          <span class="card-val">${fmtVol(r.volume_usd)}</span>
        </div>
        <div class="card-row">
          <span class="card-lbl">Next funding</span>
          <span class="card-val" id="cn-fb-${absI}">${fmtCountdown(r.next_ts)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderArbCards() {
  const wrap = document.getElementById('cards-arb');
  if (!_filteredArb.length) {
    const msg = _arbRows.length ? 'No opportunities match your filter' : 'No data yet';
    wrap.innerHTML = `<div class="empty-msg">${msg}</div>`;
    return;
  }
  const start = _pageA * PAGE_SIZE;
  const page  = _filteredArb.slice(start, start + PAGE_SIZE);
  wrap.innerHTML = page.map((r, i) => {
    const netCls   = r.net_profit > 0 ? 'net-pos' : 'net-neg';
    const netSign  = r.net_profit >= 0 ? '+' : '';
    const grossSign = r.gross_funding >= 0 ? '+' : '';
    const spreadSign = r.price_spread >= 0 ? '+' : '';
    const spreadCls  = r.price_spread >= 0 ? 'rate-neg' : 'rate-pos';
    const longRateCls  = r.long_rate  > 0 ? 'rate-pos' : r.long_rate  < 0 ? 'rate-neg' : 'rate-zero';
    const shortRateCls = r.short_rate > 0 ? 'rate-pos' : r.short_rate < 0 ? 'rate-neg' : 'rate-zero';
    const validBadge = r.valid_price
      ? '<span class="badge-valid">✓ valid</span>'
      : '<span class="badge-invalid">⚠ spread</span>';
    const aprCls = r.net_apr > 0 ? 'rate-pos' : r.net_apr < 0 ? 'rate-neg' : 'rate-zero';
    const aprSign = r.net_apr >= 0 ? '+' : '';
    return `
    <div class="card" onclick="toggleCard(this)">
      <div class="card-head">
        <span class="card-symbol">${esc(r.symbol)}</span>
        <div class="card-badges">
          <span class="ex-badge ex-${r.long_exchange}">${EX_LABEL[r.long_exchange]||r.long_exchange}</span>
          <span style="color:var(--text3);font-size:11px">→</span>
          <span class="ex-badge ex-${r.short_exchange}">${EX_LABEL[r.short_exchange]||r.short_exchange}</span>
        </div>
        <div class="card-right">
          <span class="card-net ${netCls}">${netSign}${r.net_profit.toFixed(4)}%</span>
          <span style="font-size:10px;color:var(--text3);font-family:var(--mono)">net / 8h</span>
        </div>
        <span class="card-chevron">▼</span>
      </div>
      <div class="card-body">
        <div class="card-row">
          <span class="card-lbl">Long</span>
          <div class="card-exrow">
            <div class="card-exrow-item">
              <span class="ex-badge ex-${r.long_exchange}">${EX_LABEL[r.long_exchange]||r.long_exchange}</span>
              <span class="card-val ${longRateCls}">${r.long_rate >= 0 ? '+' : ''}${r.long_rate.toFixed(4)}%</span>
            </div>
            <div style="font-size:11px;color:var(--text3)">${fmtPrice(r.long_price)} · ${fmtVol(r.long_volume)}</div>
          </div>
        </div>
        <div class="card-row">
          <span class="card-lbl">Short</span>
          <div class="card-exrow">
            <div class="card-exrow-item">
              <span class="ex-badge ex-${r.short_exchange}">${EX_LABEL[r.short_exchange]||r.short_exchange}</span>
              <span class="card-val ${shortRateCls}">${r.short_rate >= 0 ? '+' : ''}${r.short_rate.toFixed(4)}%</span>
            </div>
            <div style="font-size:11px;color:var(--text3)">${fmtPrice(r.short_price)} · ${fmtVol(r.short_volume)}</div>
          </div>
        </div>
        <div class="card-row">
          <span class="card-lbl">Gross / 8h</span>
          <span class="card-val td-gross">${grossSign}${r.gross_funding.toFixed(4)}%</span>
        </div>
        <div class="card-row">
          <span class="card-lbl">Price spread</span>
          <span class="card-val ${spreadCls}">${spreadSign}${r.price_spread.toFixed(4)}%</span>
        </div>
        <div class="card-row">
          <span class="card-lbl">Fees</span>
          <span class="card-val" style="color:var(--text3)">−${r.total_fees.toFixed(4)}%</span>
        </div>
        <div class="card-row">
          <span class="card-lbl">Net APR</span>
          <span class="card-val ${aprCls}">${aprSign}${r.net_apr.toFixed(2)}%</span>
        </div>
        <div class="card-row">
          <span class="card-lbl">Status</span>
          <span>${validBadge}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── tick countdowns ────────────────────────────────────────────────────────────
function tickCountdowns() {
  if (_mode === 'funding') {
    const start = _pageF * PAGE_SIZE;
    document.querySelectorAll('.td-next').forEach((td, i) => {
      const r = _filtered[start + i];
      if (r) td.innerHTML = fmtCountdown(r.next_ts);
    });
    const end = Math.min(start + PAGE_SIZE, _filtered.length);
    for (let i = start; i < end; i++) {
      const r = _filtered[i];
      const t = fmtCountdown(r.next_ts);
      const a = document.getElementById(`cn-f-${i}`);
      const b = document.getElementById(`cn-fb-${i}`);
      if (a) a.innerHTML = t;
      if (b) b.innerHTML = t;
    }
  }
}

// ── avatar ────────────────────────────────────────────────────────────────────
(async () => {
  try {
    const me = await Auth.apiFetch('/auth/me').then(r => r.json());
    const el = document.getElementById('nav-avatar');
    if (el && me.username) el.textContent = me.username[0].toUpperCase();
  } catch {}
})();

// ── bootstrap ─────────────────────────────────────────────────────────────────
buildExDrop();
buildSortChips();
document.getElementById('search').addEventListener('input', () => {
  _mode === 'funding' ? applyFilter() : applyArb();
});
setInterval(tickCountdowns, 1000);

connectWs();
</script>
