<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" sizes="48x48" href="/avalant_favicon-48.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/avalant_favicon-96.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/avalant_favicon-192.png">
  <link rel="icon" type="image/svg+xml" href="/avalant_favicon.svg">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="192x192" href="/avalant_favicon-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screener · Avalant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0E0E11;
  --surface:  #131217;
  --surface2: #17171C;
  --surface3: #202028;
  --border:   #22222A;
  --text:     #E6E8E3;
  --text2:    #9B9FAB;
  --text3:    #676B7E;
  --green:    #1AFFAB;
  --red:      #F87171;
  --yellow:   #E5C07B;
  --teal:     #06B6D4;
  --purple:   #925BD6;
  --mono:     'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: Inter, sans-serif;
  font-size: 14px;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── NAV ── */
.top-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 52px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 50;
}
.nav-brand { font-weight: 800; font-size: 16px; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 4px; }
.nav-brand span { color: var(--green); animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.nav-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--surface3); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--text2);
  cursor: pointer; text-decoration: none;
}

/* ── HEADER ── */
.page-header {
  padding: 24px 20px 0;
  max-width: 1400px;
  margin: 0 auto;
}
.page-title { font-size: 22px; font-weight: 800; }
.page-sub { color: var(--text3); font-size: 13px; margin-top: 4px; }

/* ── TOOLBAR ── */
.toolbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  max-width: 1400px;
  margin: 0 auto;
  flex-wrap: wrap;
}
.search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 280px; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
#search {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  padding: 7px 10px 7px 32px;
  outline: none;
  transition: border-color .2s;
}
#search:focus { border-color: var(--green); }
#search::placeholder { color: var(--text3); }

.ex-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.ex-chip {
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text2);
  transition: all .15s;
  user-select: none;
}
.ex-chip.active { color: var(--bg); }
.ex-chip[data-ex="binance"].active  { background: #F0B90B; border-color: #F0B90B; }
.ex-chip[data-ex="bybit"].active    { background: #F7A600; border-color: #F7A600; }
.ex-chip[data-ex="gate"].active     { background: #E40C5B; border-color: #E40C5B; }
.ex-chip[data-ex="kucoin"].active   { background: #00BC8C; border-color: #00BC8C; }
.ex-chip[data-ex="hyperliquid"].active { background: #48CDD8; border-color: #48CDD8; }

.toolbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.refresh-info { font-size: 11px; color: var(--text3); font-family: var(--mono); white-space: nowrap; }
.btn-refresh {
  padding: 6px 12px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
}
.btn-refresh:hover { border-color: var(--green); color: var(--green); }

/* ── STATS ── */
.stats-bar {
  display: flex;
  gap: 20px;
  padding: 0 20px 16px;
  max-width: 1400px;
  margin: 0 auto;
  flex-wrap: wrap;
}
.stat-item { font-size: 12px; color: var(--text3); }
.stat-item b { color: var(--text2); font-family: var(--mono); }

/* ── TABLE ── */
.table-wrap {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 20px;
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 680px;
}
thead th {
  text-align: left;
  padding: 8px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
thead th:hover { color: var(--text2); }
thead th .sort-arrow { margin-left: 4px; opacity: .4; }
thead th.sorted .sort-arrow { opacity: 1; color: var(--green); }
tbody tr {
  border-bottom: 1px solid rgba(34,34,42,.6);
  transition: background .12s;
}
tbody tr:hover { background: var(--surface); }
tbody td {
  padding: 10px 12px;
  font-size: 13px;
  white-space: nowrap;
}

/* symbol */
.td-symbol { font-weight: 700; font-family: var(--mono); }

/* exchange badge */
.ex-badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 5px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .3px;
}
.ex-binance     { background: rgba(240,185,11,.15); color: #F0B90B; }
.ex-bybit       { background: rgba(247,166,0,.15);  color: #F7A600; }
.ex-gate        { background: rgba(228,12,91,.15);  color: #E40C5B; }
.ex-kucoin      { background: rgba(0,188,140,.15);  color: #00BC8C; }
.ex-hyperliquid { background: rgba(72,205,216,.15); color: #48CDD8; }
.ex-okx         { background: rgba(255,255,255,.08); color: var(--text2); }

/* price */
.td-price { font-family: var(--mono); color: var(--text2); }

/* funding rate */
.td-rate { font-family: var(--mono); font-weight: 600; }
.rate-pos { color: var(--red); }
.rate-neg { color: var(--green); }
.rate-zero { color: var(--text3); }

/* apr */
.td-apr { font-family: var(--mono); font-weight: 700; }

/* next funding countdown */
.td-next { font-family: var(--mono); color: var(--text3); font-size: 12px; }
.next-soon { color: var(--yellow); }

/* empty / loading */
.empty-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.spinner {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 100;
}
.bnav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  color: var(--text3); text-decoration: none; font-size: 10px; font-weight: 500;
  padding: 6px 12px;
  transition: color .15s;
}
.bnav-item.active, .bnav-item:hover { color: var(--green); }

@media (max-width: 600px) {
  .toolbar { gap: 8px; }
  .search-wrap { max-width: 100%; }
  .toolbar-right { width: 100%; justify-content: space-between; }
}
</style>
</head>
<body>

<!-- ── TOP NAV ── -->
<nav class="top-nav">
  <a class="nav-brand" href="/app">avalant<span>_</span></a>
  <a class="nav-avatar" href="/profile" id="nav-avatar">?</a>
</nav>

<!-- ── HEADER ── -->
<div class="page-header">
  <div class="page-title">Funding Screener</div>
  <div class="page-sub">Perpetual futures funding rates across exchanges — sorted by highest opportunity</div>
</div>

<!-- ── TOOLBAR ── -->
<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.8"/><path d="M15 15l3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    <input id="search" type="text" placeholder="Search token…" autocomplete="off">
  </div>
  <div class="ex-chips" id="ex-chips"></div>
  <div class="toolbar-right">
    <span class="refresh-info" id="refresh-info">—</span>
    <button class="btn-refresh" onclick="load()">↻ Refresh</button>
  </div>
</div>

<!-- ── STATS ── -->
<div class="stats-bar" id="stats-bar"></div>

<!-- ── TABLE ── -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('symbol')"  data-col="symbol">Token <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('exchange')" data-col="exchange">Exchange <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('price')"   data-col="price">Price <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('rate')"    data-col="rate">Funding / interval <span class="sort-arrow">↕</span></th>
        <th onclick="sortBy('apr')"     data-col="apr" class="sorted">APR <span class="sort-arrow">↓</span></th>
        <th onclick="sortBy('next_ts')" data-col="next_ts">Next funding <span class="sort-arrow">↕</span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- ── TOAST ── -->
<div style="position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:200" id="toast-wrap"></div>

<script src="/auth.js"></script>
<script>
Auth.requireAuth('/login');

// ── state ──────────────────────────────────────────────────────────────────────
let _rows = [];          // all rows from API
let _filtered = [];      // after search + exchange filter
let _exFilter = new Set(); // active exchange filters (empty = all)
let _sort = { col: 'apr', asc: false };
let _refreshTimer = null;
let _countdown = 0;
const REFRESH_INTERVAL = 30; // seconds

const EXCHANGES = ['binance', 'bybit', 'gate', 'kucoin', 'hyperliquid'];
const EX_LABEL = {
  binance: 'Binance', bybit: 'Bybit', gate: 'Gate.io',
  kucoin: 'KuCoin', hyperliquid: 'Hyperliquid',
};

// ── init ───────────────────────────────────────────────────────────────────────
(function initNav() {
  const u = Auth.getUser();
  if (u) {
    const el = document.getElementById('nav-avatar');
    if (el) el.textContent = (u.username || u.email || 'U')[0].toUpperCase();
  }
})();

function buildExChips() {
  const wrap = document.getElementById('ex-chips');
  wrap.innerHTML = EXCHANGES.map(ex => `
    <div class="ex-chip active" data-ex="${ex}" onclick="toggleEx('${ex}')">${EX_LABEL[ex]}</div>
  `).join('');
  _exFilter = new Set();  // all active by default
}

function toggleEx(ex) {
  const chip = document.querySelector(`.ex-chip[data-ex="${ex}"]`);
  if (_exFilter.has(ex)) {
    _exFilter.delete(ex);
    chip.classList.add('active');
  } else {
    _exFilter.add(ex);
    chip.classList.remove('active');
  }
  applyFilter();
}

// ── data loading ───────────────────────────────────────────────────────────────
async function load() {
  clearTimeout(_refreshTimer);
  document.getElementById('tbody').innerHTML =
    '<tr><td colspan="6" class="empty-msg"><span class="spinner"></span>Loading funding rates…</td></tr>';

  try {
    const res = await Auth.apiFetch('/screener/funding');
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    _rows = data.rows || [];
    renderStats(data);
    applyFilter();
    scheduleRefresh();
  } catch (e) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="6" class="empty-msg">Failed to load: ${esc(e.message)}</td></tr>`;
  }
}

function scheduleRefresh() {
  _countdown = REFRESH_INTERVAL;
  updateCountdown();
  _refreshTimer = setInterval(() => {
    _countdown--;
    updateCountdown();
    if (_countdown <= 0) {
      clearInterval(_refreshTimer);
      load();
    }
  }, 1000);
}

function updateCountdown() {
  document.getElementById('refresh-info').textContent =
    `Auto-refresh in ${_countdown}s`;
}

// ── filter + sort ──────────────────────────────────────────────────────────────
function applyFilter() {
  const q = document.getElementById('search').value.trim().toUpperCase();
  _filtered = _rows.filter(r => {
    if (_exFilter.has(r.exchange)) return false;
    if (q && !r.symbol.includes(q)) return false;
    return true;
  });
  sortRows();
}

function sortBy(col) {
  if (_sort.col === col) {
    _sort.asc = !_sort.asc;
  } else {
    _sort.col = col;
    _sort.asc = col === 'symbol' || col === 'exchange';
  }
  // update header arrows
  document.querySelectorAll('thead th').forEach(th => {
    const c = th.dataset.col;
    th.classList.toggle('sorted', c === _sort.col);
    const arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = c === _sort.col ? (_sort.asc ? '↑' : '↓') : '↕';
  });
  sortRows();
}

function sortRows() {
  const col = _sort.col;
  _filtered.sort((a, b) => {
    let va = a[col], vb = b[col];
    if (col === 'symbol' || col === 'exchange') {
      va = String(va); vb = String(vb);
      return _sort.asc ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    // numeric
    if (col === 'apr') { va = Math.abs(va); vb = Math.abs(vb); }
    return _sort.asc ? va - vb : vb - va;
  });
  render();
}

// ── render ────────────────────────────────────────────────────────────────────
function renderStats(data) {
  const total = (data.rows || []).length;
  const exCount = new Set((data.rows || []).map(r => r.exchange)).size;
  const ts = data.ts ? new Date(data.ts * 1000).toLocaleTimeString() : '—';
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-item"><b>${total}</b> contracts tracked</div>
    <div class="stat-item"><b>${exCount}</b> exchanges</div>
    <div class="stat-item">Updated at <b>${ts}</b></div>
  `;
}

function fmtPrice(p) {
  if (!p) return '—';
  if (p >= 1000) return '$' + p.toLocaleString('en-US', {maximumFractionDigits: 2});
  if (p >= 1) return '$' + p.toFixed(4);
  return '$' + p.toPrecision(4);
}

function fmtRate(rate, interval_h) {
  const pct = (rate * 100).toFixed(4);
  const sign = rate >= 0 ? '+' : '';
  const cls = rate > 0 ? 'rate-pos' : rate < 0 ? 'rate-neg' : 'rate-zero';
  const label = interval_h === 1 ? '1h' : `${interval_h}h`;
  return `<span class="td-rate ${cls}">${sign}${pct}%<span style="font-weight:400;color:var(--text3);font-size:11px"> /${label}</span></span>`;
}

function fmtApr(apr) {
  if (apr === null || apr === undefined) return '—';
  const sign = apr >= 0 ? '+' : '';
  const cls = apr > 0 ? 'rate-pos' : apr < 0 ? 'rate-neg' : 'rate-zero';
  return `<span class="td-apr ${cls}">${sign}${Math.abs(apr).toFixed(2)}%</span>`;
}

function fmtCountdown(next_ts) {
  if (!next_ts) return '—';
  const diff = next_ts - Math.floor(Date.now() / 1000);
  if (diff <= 0) return '<span class="next-soon">now</span>';
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  const s = diff % 60;
  const cls = diff < 600 ? 'next-soon' : '';  // highlight if < 10 min
  if (h > 0) return `<span class="${cls}">${h}h ${m}m</span>`;
  if (m > 0) return `<span class="${cls}">${m}m ${s}s</span>`;
  return `<span class="next-soon">${s}s</span>`;
}

function render() {
  const tbody = document.getElementById('tbody');
  if (!_filtered.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-msg">No contracts match your filter</td></tr>';
    return;
  }
  tbody.innerHTML = _filtered.map(r => `
    <tr>
      <td class="td-symbol">${esc(r.symbol)}</td>
      <td><span class="ex-badge ex-${r.exchange}">${EX_LABEL[r.exchange] || r.exchange}</span></td>
      <td class="td-price">${fmtPrice(r.price)}</td>
      <td>${fmtRate(r.rate, r.interval_h)}</td>
      <td>${fmtApr(r.apr)}</td>
      <td class="td-next">${fmtCountdown(r.next_ts)}</td>
    </tr>
  `).join('');
}

// Update countdown cells every second without full re-render
function tickCountdowns() {
  const cells = document.querySelectorAll('.td-next');
  const rows = _filtered;
  cells.forEach((td, i) => {
    if (rows[i]) td.innerHTML = fmtCountdown(rows[i].next_ts);
  });
}

// ── utils ──────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── bootstrap ─────────────────────────────────────────────────────────────────
buildExChips();
document.getElementById('search').addEventListener('input', applyFilter);
setInterval(tickCountdowns, 1000);
load();
</script>
