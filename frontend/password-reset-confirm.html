<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/avalant_favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set a new password — Avalant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0E0E11; --surface:#131217; --border:#22222A; --text:#E6E8E3; --text2:#9B9FAB; --text3:#676B7E; --green:#1AFFAB; --red:#F87171; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:400px}
    .brand{font-weight:800;font-size:22px;color:var(--green);text-align:center;margin-bottom:6px}
    .brand::after{content:'_';animation:blink 1.1s steps(2,start) infinite}
    @keyframes blink{to{visibility:hidden}}
    h1{font-size:18px;font-weight:700;text-align:center;margin-bottom:6px}
    p.sub{color:var(--text2);font-size:13px;text-align:center;margin-bottom:24px}
    label{display:block;color:var(--text2);font-size:12px;margin-bottom:6px;font-weight:500}
    input{width:100%;padding:11px 12px;border-radius:8px;border:1px solid var(--border);background:#17171C;color:var(--text);font:inherit;margin-bottom:14px;outline:none}
    input:focus{border-color:var(--green)}
    button{width:100%;padding:12px;border-radius:9px;background:var(--green);color:#0A0A0C;border:none;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
    button:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:14px;padding:10px 12px;border-radius:8px;font-size:13px;display:none}
    .msg.ok{display:block;background:rgba(26,255,171,.08);color:var(--green);border:1px solid rgba(26,255,171,.3)}
    .msg.err{display:block;background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.3)}
    .back{display:block;margin-top:16px;text-align:center;color:var(--text3);font-size:12px;text-decoration:none}
    .back:hover{color:var(--text2)}
    .hint{color:var(--text3);font-size:11px;margin-top:-10px;margin-bottom:12px}
  </style>
<script src="/banner.js" defer></script>
</head>
<body>
  <div class="card">
    <div class="brand">avalant</div>
    <h1>Set a new password</h1>
    <p class="sub">Enter a new password — at least 8 characters.</p>
    <form id="f">
      <label for="pw">New password</label>
      <input id="pw" type="password" minlength="8" required autocomplete="new-password">
      <div class="hint">Minimum 8 characters</div>
      <button type="submit" id="btn">Update password</button>
    </form>
    <div id="msg" class="msg"></div>
    <a class="back" href="/login">← Back to sign in</a>
  </div>
<script>
const params = new URLSearchParams(location.search);
const token = params.get('token') || '';
const form = document.getElementById('f');
const msg  = document.getElementById('msg');
const btn  = document.getElementById('btn');

if (!token) {
  msg.className = 'msg err';
  msg.textContent = 'No token in the URL. Use the link from your email.';
  btn.disabled = true;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.className = 'msg';
  const pw = document.getElementById('pw').value;
  if (pw.length < 8) {
    msg.className = 'msg err';
    msg.textContent = 'Password must be at least 8 characters';
    return;
  }
  btn.disabled = true; btn.textContent = 'Updating…';
  try {
    const r = await fetch('/api/auth/password-reset/confirm', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ token, new_password: pw }),
    });
    const j = await r.json();
    if (r.ok) {
      msg.className = 'msg ok';
      msg.textContent = 'Password updated — redirecting to sign in…';
      setTimeout(() => { location.href = '/login'; }, 1500);
    } else {
      msg.className = 'msg err';
      msg.textContent = j.detail || 'Reset failed';
      btn.disabled = false; btn.textContent = 'Update password';
    }
  } catch (err) {
    msg.className = 'msg err';
    msg.textContent = 'Network error — please try again';
    btn.disabled = false; btn.textContent = 'Update password';
  }
});
</script>
</body>
</html>
