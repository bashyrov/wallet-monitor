<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/avalant_favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Set a new password — Avalant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,500&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/design.css">
  <style>
    body { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(26,255,171,0.06), transparent 70%),
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px) 0 0/100% 64px,
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px) 0 0/64px 100%;
    }
    .auth-shell { position: relative; z-index: 1; width: 100%; max-width: 440px; }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-xl); padding: 40px 32px;
      box-shadow: var(--shadow-lg);
      animation: fade-up var(--dur-med) var(--ease) both;
    }
    @keyframes fade-up { from { opacity:0; transform: translateY(8px) } to { opacity:1; transform:none } }
    .auth-mark {
      width: 56px; height: 56px; margin: 0 auto 24px;
      background: var(--green-soft); border: 1px solid var(--green-edge);
      border-radius: var(--r-lg); display: grid; place-items: center;
      color: var(--green);
    }
    .auth-title {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 32px; font-weight: 400; letter-spacing: -0.02em;
      text-align: center; margin: 0 0 8px;
    }
    .auth-sub { color: var(--text2); font-size: 14px; text-align: center; margin: 0 0 28px; line-height: 1.55; }
    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .auth-form label { display: block; color: var(--text2); font-size: 12px; font-weight: 500; margin-bottom: 6px; }
    .hint { color: var(--text3); font-size: 11px; margin-top: 6px; }
    .msg { padding: 11px 14px; border-radius: var(--r); font-size: 13px; display: none; line-height: 1.5; }
    .msg.ok { display: block; background: var(--green-soft); color: var(--green); border: 1px solid var(--green-edge); }
    .msg.err { display: block; background: rgba(248,113,113,0.08); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
    .auth-back { display: block; margin-top: 20px; text-align: center; color: var(--text3); font-size: 13px; text-decoration: none; transition: color var(--dur-fast) ease; }
    .auth-back:hover { color: var(--text2); }
    @media (max-width: 600px) {
      .auth-card { padding: 32px 22px; border-radius: var(--r-lg); }
      .auth-title { font-size: 28px; }
    }
  </style>
<script src="/banner.js" defer></script>
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-mark">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg>
      </div>
      <h1 class="auth-title">Set a new password</h1>
      <p class="auth-sub">Choose a strong password — at least 8 characters.</p>
      <form class="auth-form" id="f">
        <div>
          <label for="pw">New password</label>
          <input class="input" id="pw" type="password" minlength="8" required autocomplete="new-password">
          <div class="hint">Minimum 8 characters</div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" id="btn">Update password</button>
      </form>
      <div id="msg" class="msg"></div>
      <a class="auth-back" href="/login">← Back to sign in</a>
    </div>
  </div>
<script>
const params = new URLSearchParams(location.search);
const token = params.get('token') || '';
const form = document.getElementById('f');
const msg  = document.getElementById('msg');
const btn  = document.getElementById('btn');

if (!token) {
  msg.className = 'msg err';
  msg.textContent = 'No token in the URL. Use the link from your email.';
  btn.disabled = true;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.className = 'msg';
  const pw = document.getElementById('pw').value;
  if (pw.length < 8) {
    msg.className = 'msg err';
    msg.textContent = 'Password must be at least 8 characters';
    return;
  }
  btn.disabled = true; btn.textContent = 'Updating…';
  try {
    const r = await fetch('/api/auth/password-reset/confirm', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ token, new_password: pw }),
    });
    const j = await r.json();
    if (r.ok) {
      msg.className = 'msg ok';
      msg.textContent = 'Password updated — redirecting to sign in…';
      setTimeout(() => { location.href = '/login'; }, 1500);
    } else {
      msg.className = 'msg err';
      msg.textContent = j.detail || 'Reset failed';
      btn.disabled = false; btn.textContent = 'Update password';
    }
  } catch (err) {
    msg.className = 'msg err';
    msg.textContent = 'Network error — please try again';
    btn.disabled = false; btn.textContent = 'Update password';
  }
});
</script>
</body>
</html>
